/* ══════════════════════════════════════
   GEMINI TEXT
══════════════════════════════════════ */
async function aiText(prompt, key) {
  if (!key) throw new Error("Please save your Gemini API key first.");
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`,
    { method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ contents:[{ parts:[{ text:prompt }] }] }) }
  );
  const d = await res.json();
  if (d.error) throw new Error(d.error.message);
  return d.candidates?.[0]?.content?.parts?.[0]?.text || "";
}

/* ══════════════════════════════════════
   UNSPLASH IMAGE SEARCH — no API key needed!
   Uses the free public access API (50 req/hr no key, or 5000/hr with free key)
══════════════════════════════════════ */
async function searchUnsplash(query, unsplashKey) {
  // With key: uses Unsplash API. Without key: uses source.unsplash.com thumbnails
  if (unsplashKey && unsplashKey.trim().length > 5) {
    const res = await fetch(
      `https://api.unsplash.com/search/photos?query=${encodeURIComponent(query)}&per_page=9&orientation=landscape`,
      { headers:{ Authorization: `Client-ID ${unsplashKey}` } }
    );
    const d = await res.json();
    if (d.errors) throw new Error(d.errors[0]);
    return (d.results||[]).map(p=>({
      id: p.id,
      thumb: p.urls.small,
      full: p.urls.full,
      download: p.links.download + "?force=true",
      photographer: p.user.name,
      profileUrl: p.user.links.html,
    }));
  } else {
    // No key: generate a grid of Unsplash source URLs (always works, no auth)
    const keywords = query.replace(/\s+/g,",");
    return Array.from({length:9},(_,i)=>({
      id: String(i),
      thumb: `https://source.unsplash.com/400x250/?${keywords}&sig=${i}`,
      full:  `https://source.unsplash.com/1600x900/?${keywords}&sig=${i}`,
      download: `https://source.unsplash.com/1600x900/?${keywords}&sig=${i}`,
      photographer: "Unsplash",
      profileUrl: "https://unsplash.com",
    }));
  }
}

/* ══════════════════════════════════════
   JSON PARSER
══════════════════════════════════════ */
function parseJSON(raw) {
  try { return JSON.parse(raw.replace(/```json|```/g,"").trim()); }
  catch(e) {
    // Try extracting JSON from within the text
    const m = raw.match(/\[[\s\S]*\]|\{[\s\S]*\}/);
    if (m) try { return JSON.parse(m[0]); } catch {}
    return null;
  }
}

/* ══════════════════════════════════════
   PPTX BUILDER — uses PptxGenJS v4
══════════════════════════════════════ */
async function buildPPTX(slides, title) {
  const Lib = window.PptxGenJS;
  if (!Lib) throw new Error("PPT library not available. Please refresh the page.");
  const pres = new Lib();
  pres.layout = "LAYOUT_16x9";
  pres.title  = title;
  const C = { dark:"0F172A", brand:"0A66C2", accent:"38BDF8", white:"FFFFFF", muted:"94A3B8", slate:"334155", light:"EFF6FF" };

  slides.forEach((s, i) => {
    const sl = pres.addSlide();
    const isTitle = i===0, isLast = i===slides.length-1;
    sl.background = { color: isTitle||isLast ? C.dark : C.white };
    // Left blue bar
    sl.addShape(pres.ShapeType.rect, { x:0, y:0, w:0.2, h:5.625, fill:{color:C.brand}, line:{color:C.brand,width:0} });

    if (isTitle) {
      sl.addShape(pres.ShapeType.ellipse, { x:6.8, y:-1.5, w:5.5, h:5.5, fill:{color:C.brand,transparency:88}, line:{color:C.brand,width:0} });
      sl.addShape(pres.ShapeType.ellipse, { x:7.8, y:3, w:3, h:3, fill:{color:C.accent,transparency:88}, line:{color:C.accent,width:0} });
      sl.addText("⚡ PostFlow AI", { x:0.38, y:0.25, w:2.4, h:0.42, fontSize:11, color:C.white, bold:true, align:"center", valign:"middle" });
      sl.addText(title, { x:0.38, y:1.1, w:6.2, h:2.4, fontSize:30, color:C.white, bold:true, align:"left", valign:"middle" });
      sl.addText(s.body||"A LinkedIn carousel", { x:0.38, y:3.65, w:6.2, h:0.7, fontSize:13, color:C.muted, align:"left" });
      sl.addText("Made with PostFlow AI", { x:0.38, y:5.1, w:6, h:0.35, fontSize:9, color:"475569", align:"left" });
    } else if (isLast) {
      sl.addText("Key Takeaway", { x:0.38, y:0.55, w:9, h:0.4, fontSize:12, color:C.accent, bold:true, align:"left" });
      sl.addText(s.heading||"", { x:0.38, y:1.05, w:8.8, h:1.6, fontSize:26, color:C.white, bold:true, align:"left" });
      sl.addText(s.body||"", { x:0.38, y:2.8, w:7.5, h:1.5, fontSize:13, color:C.muted, align:"left" });
      sl.addText("Follow for more →", { x:0.38, y:4.55, w:2.8, h:0.52, fontSize:13, color:C.dark, bold:true, align:"center", valign:"middle",
        fill:{color:C.accent}, shape:pres.ShapeType.roundRect });
    } else {
      sl.addText(`${i}/${slides.length-1}`, { x:8.9, y:0.2, w:0.75, h:0.35, fontSize:9, color:C.white, bold:true, align:"center" });
      sl.addText(s.label||`Point ${i}`, { x:0.38, y:0.28, w:8, h:0.38, fontSize:11, color:C.brand, bold:true, align:"left" });
      sl.addText(s.heading||"", { x:0.38, y:0.72, w:8.5, h:1.0, fontSize:22, color:C.dark, bold:true, align:"left" });
      sl.addText(s.body||"", { x:0.38, y:1.98, w:5.5, h:2.5, fontSize:12, color:C.slate, align:"left", valign:"top" });
      // Right box
      sl.addShape(pres.ShapeType.rect, { x:6.3, y:1.2, w:3.3, h:3.4, fill:{color:C.light}, line:{color:"CBD5E1",width:1} });
      sl.addShape(pres.ShapeType.rect, { x:6.3, y:1.2, w:0.1, h:3.4, fill:{color:C.brand}, line:{color:C.brand,width:0} });
      if (s.stat) {
        sl.addText(s.stat, { x:6.45, y:1.7, w:3, h:0.9, fontSize:30, color:C.brand, bold:true, align:"center" });
        sl.addText(s.statLabel||"", { x:6.45, y:2.65, w:3, h:0.8, fontSize:11, color:"64748B", align:"center" });
      } else {
        sl.addText("💡 Pro Tip", { x:6.45, y:1.5, w:3, h:0.38, fontSize:11, color:C.brand, bold:true, align:"left" });
        sl.addText(s.tip||(s.body||"").slice(0,100), { x:6.45, y:1.95, w:3, h:2.3, fontSize:11, color:C.slate, align:"left", valign:"top" });
      }
      sl.addText("PostFlow AI", { x:0.38, y:5.25, w:3, h:0.25, fontSize:8, color:C.muted, align:"left" });
    }
  });
  return await pres.write({ outputType:"blob" });
}

    sb("topics",true);sm("topics","");
    try{
      const ctx=custom.trim()?`Custom topic: "${custom}"`:`Domain: "${domain}"`;

    }catch(e){sm("topics",`❌ ${e.message}`);}
    sb("topics",false);
  }

    if(!custom.trim())return;

        <div style={{display:"flex",gap:7}}>
          <button onClick={reset} style={{background:"transparent",border:"1px solid #334155",color:"#94A3B8",padding:"5px 13px",borderRadius:50,fontSize:11,cursor:"pointer"}}>🔄 New Post</button>
          <button onClick={onHome} style={{background:"transparent",border:"1px solid #334155",color:"#94A3B8",padding:"5px 13px",borderRadius:50,fontSize:11,cursor:"pointer"}}>← Home</button>
        </div>
      </div>

      {/* Progress bar */}
      <div style={{background:"#fff",borderBottom:"1px solid #E2E8F0",padding:"12px 0"}}>
        <div style={{maxWidth:680,margin:"0 auto",padding:"0 20px",display:"flex",alignItems:"center"}}>
          {["Keys","Topic","Post","Assets"].map((s,i)=>{
            const n=i+1,done=step>n,active=step===n;
            return (
              <React.Fragment key={s}>
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                  <div style={{width:26,height:26,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:11,background:done?"#0A66C2":active?"#fff":"#F1F5F9",color:done?"#fff":active?"#0A66C2":"#94A3B8",border:active?"2px solid #0A66C2":"none",transition:"all .3s"}}>{done?"✓":n}</div>
                  <span style={{fontSize:10,color:active?"#0A66C2":"#94A3B8",fontWeight:active?700:400,whiteSpace:"nowrap"}}>{s}</span>
                </div>
                {i<3&&<div style={{flex:1,height:2,background:step>n?"#0A66C2":"#E2E8F0",margin:"0 5px",marginBottom:14,transition:"background .4s"}}/>}
              </React.Fragment>
            );
          })}
        </div>
      </div>

      <div style={{maxWidth:680,margin:"20px auto 0",padding:"0 16px"}}>

        {/* ── KEYS ── */}
        <div style={card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
            <div>
              <h2 style={{margin:"0 0 4px",fontSize:18,color:"#0F172A"}}>🔑 API Keys</h2>
              <p style={{margin:0,color:"#64748B",fontSize:13}}>Keys stay in your browser only — never sent to any server except Google & Unsplash.</p>
            </div>
            {keysSaved&&<span style={{background:"#F0FDF4",color:"#15803D",fontSize:12,fontWeight:700,padding:"4px 12px",borderRadius:20}}>✓ Saved</span>}
          </div>

          <div style={{marginTop:14}}>
            <label style={{fontSize:11,fontWeight:700,color:"#64748B",display:"block",marginBottom:5,textTransform:"uppercase"}}>
              Gemini Key (required) — <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener noreferrer" style={{color:"#0A66C2",fontWeight:400,textTransform:"none"}}>Get free at aistudio.google.com</a>
            </label>
            <div style={{position:"relative"}}>
              <input type={showKey?"text":"password"} placeholder="AIza..." value={geminiKey} onChange={e=>{setGeminiKey(e.target.value);setKeysSaved(false);sm("keys","");}} style={inp}/>
              <button onClick={()=>setShowKey(p=>!p)} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:14}}>{showKey?"🙈":"👁️"}</button>
            </div>
          </div>

          <div style={{marginTop:12}}>
            <label style={{fontSize:11,fontWeight:700,color:"#64748B",display:"block",marginBottom:5,textTransform:"uppercase"}}>
              Unsplash Key (optional) — <a href="https://unsplash.com/developers" target="_blank" rel="noopener noreferrer" style={{color:"#0A66C2",fontWeight:400,textTransform:"none"}}>Free at unsplash.com/developers</a>
              <span style={{color:"#94A3B8",fontWeight:400,marginLeft:6}}>· Leave blank to use auto photos</span>
            </label>
            <input type="password" placeholder="Leave blank — photos still work without a key!" value={unsplashKey} onChange={e=>{setUnsplashKey(e.target.value);}} style={inp}/>
          </div>

          <button style={{...bP,marginTop:14}} onClick={saveKeys}>Save & Continue →</button>
          {msgs.keys&&<Notice type={msgs.keys.startsWith("✅")?"success":"warn"}>{msgs.keys}</Notice>}

          {!keysSaved&&(
            <div style={{marginTop:14,padding:"12px 14px",background:"#F8FAFC",borderRadius:12,border:"1px solid #E2E8F0",fontSize:13,color:"#475569",lineHeight:1.8}}>
              <strong style={{color:"#0F172A"}}>How to get your free Gemini key (60 seconds):</strong><br/>
              1. Open <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener noreferrer" style={{color:"#0A66C2"}}>aistudio.google.com/app/apikey</a><br/>
              2. Sign in with Google → click <strong>"Create API Key"</strong><br/>
              3. Copy and paste it above → click <strong>Save & Continue</strong>
            </div>
          )}
        </div>

        {/* ── DOMAIN + TOPIC ── */}
        <div style={card}>
          <h2 style={{margin:"0 0 4px",fontSize:18,color:"#0F172A"}}>🎯 Domain & Topic</h2>
          <p style={{margin:"0 0 14px",color:"#64748B",fontSize:13}}>Pick a niche for AI ideas — or type your own topic and skip straight to drafting</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
            <div>
              <label style={{fontSize:11,fontWeight:700,color:"#64748B",display:"block",marginBottom:5,textTransform:"uppercase"}}>Select Domain</label>
              <select value={domain} onChange={e=>{setDomain(e.target.value);setTopics([]);setSelected(null);}} style={{...inp,cursor:"pointer"}}>
                <option value="">— Choose niche —</option>
                {DOMAINS.map(d=><option key={d} value={d}>{d}</option>)}
              </select>
            </div>
            <div>
              <label style={{fontSize:11,fontWeight:700,color:"#64748B",display:"block",marginBottom:5,textTransform:"uppercase"}}>Or Type Your Topic</label>
              <input type="text" placeholder="e.g. How I got 10k followers..." value={custom} onChange={e=>setCustom(e.target.value)} onKeyDown={e=>e.key==="Enter"&&useDirect()} style={inp}/>
            </div>
          </div>
          <div style={{display:"flex",gap:9,flexWrap:"wrap"}}>
            <button style={{...bP,opacity:(!domain&&!custom.trim())||busy.topics?0.6:1}} onClick={getTopics} disabled={busy.topics||(!domain&&!custom.trim())}>
              {busy.topics?<><Spin/>Finding topics...</>:"🔥 Get AI Topic Ideas"}
            </button>
            {custom.trim()&&<button style={bO} onClick={useDirect}>✍️ Use My Topic Directly</button>}
          </div>
          {msgs.topics&&<Notice type="error">{msgs.topics}</Notice>}
        </div>

        {/* ── TOPIC LIST ── */}
        {step>=2&&topics.length>0&&(
          <div style={card}>
            <h2 style={{margin:"0 0 4px",fontSize:18,color:"#0F172A"}}>🔥 AI Topic Suggestions</h2>
            <p style={{margin:"0 0 14px",color:"#64748B",fontSize:13}}>Click one to select it</p>
            {topics.map((t,i)=>(
              <div key={i} onClick={()=>pick(t)} style={{border:`2px solid ${selected===t?"#0A66C2":"#E2E8F0"}`,borderRadius:13,padding:"13px 15px",cursor:"pointer",background:selected===t?"#EFF6FF":"#FAFCFF",marginBottom:9,transition:"all .2s"}}>
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  <div style={{fontWeight:700,color:"#0F172A",fontSize:14}}>{t.emoji} {t.title}</div>
                  {selected===t&&<span style={{color:"#0A66C2",flexShrink:0}}>✓</span>}
                </div>
                <div style={{fontSize:12,color:"#475569",marginTop:4}}>💡 {t.hook}</div>
                <div style={{display:"flex",gap:12,marginTop:5,flexWrap:"wrap"}}>
                  <span style={{fontSize:12,color:"#0A66C2"}}>📈 {t.why}</span>
                  {t.angle&&<span style={{fontSize:12,color:"#7C3AED"}}>🎯 {t.angle}</span>}
                </div>
              </div>
            ))}
            {selected&&<button style={{...bP,marginTop:8}} onClick={draftPost} disabled={busy.post}>{busy.post?<><Spin/>Drafting...</>:"✍️ Draft My Post →"}</button>}
            {msgs.post&&<Notice type="error">{msgs.post}</Notice>}
          </div>
        )}

        {/* custom topic row */}
        {step>=2&&selected&&topics.length===0&&(
          <div style={card}>
            <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:15,color:"#0F172A"}}>{selected.emoji} {selected.title}</div>
                <div style={{fontSize:13,color:"#64748B",marginTop:3}}>Your custom topic</div>
              </div>
              <button style={bP} onClick={draftPost} disabled={busy.post}>{busy.post?<><Spin/>Drafting...</>:"✍️ Draft My Post →"}</button>
            </div>
            {msgs.post&&<Notice type="error">{msgs.post}</Notice>}
          </div>
        )}

        {/* ── POST ── */}
        {step>=3&&post&&(
          <div style={card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
              <div>
                <h2 style={{margin:0,fontSize:18,color:"#0F172A"}}>✍️ Your LinkedIn Post</h2>
                <p style={{margin:"3px 0 0",fontSize:13,color:"#64748B"}}>Edit freely below</p>
              </div>
              <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                <button style={bO} onClick={copyAll}>{copied?"✅ Copied!":"📋 Copy + Hashtags"}</button>
                <a href="https://www.linkedin.com/feed/" target="_blank" rel="noopener noreferrer" style={{textDecoration:"none"}}><button style={bP}>Open LinkedIn →</button></a>
              </div>
            </div>
            <textarea value={post} onChange={e=>setPost(e.target.value)} style={{...ta,minHeight:220}}/>
            {tags&&<div style={{marginTop:10,padding:"10px 14px",background:"#EFF6FF",borderRadius:10,fontSize:13,color:"#1D4ED8"}}>{tags}</div>}
            <div style={{marginTop:7,fontSize:12,color:"#94A3B8"}}>{post.split(/\s+/).filter(Boolean).length} words</div>
          </div>
        )}

        {/* ── PPT ── */}
        {step>=3&&(
          <div style={card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10,marginBottom:12}}>
              <div>
                <h2 style={{margin:"0 0 4px",fontSize:18,color:"#0F172A"}}>📊 Carousel PPT</h2>
                <p style={{margin:0,fontSize:13,color:"#64748B"}}>Branded 6-slide .pptx — download & post on LinkedIn</p>
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {!pptBlob
                  ?<button style={{...bO,opacity:busy.ppt?0.6:1}} onClick={genPPT} disabled={busy.ppt}>{busy.ppt?<><Spin color="#0A66C2"/>Building...</>:"⚡ Generate PPT"}</button>
                  :<><button style={{...bO,opacity:busy.ppt?0.6:1}} onClick={genPPT} disabled={busy.ppt}>↺ Redo</button><button style={bG} onClick={dlPPT}>⬇ Download .pptx</button></>
                }
              </div>
            </div>
            {msgs.ppt&&<Notice type={msgs.ppt.startsWith("✅")?"success":msgs.ppt.startsWith("❌")?"error":"warn"}>{msgs.ppt}</Notice>}
            {pptSlides&&(
              <div style={{marginTop:14,display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(145px,1fr))",gap:9}}>
                {pptSlides.map((s,i)=>(
                  <div key={i} style={{border:"1px solid #E2E8F0",borderRadius:10,overflow:"hidden",background:i===0||i===pptSlides.length-1?"#0F172A":"#fff"}}>
                    <div style={{background:"#0A66C2",height:3}}/>
                    <div style={{padding:"9px 11px"}}>
                      <div style={{fontSize:9,color:i===0||i===pptSlides.length-1?"#38BDF8":"#0A66C2",fontWeight:800,marginBottom:3,textTransform:"uppercase"}}>{i===0?"Title":i===pptSlides.length-1?"CTA":`Slide ${i+1}`}</div>
                      <div style={{fontWeight:700,fontSize:11,color:i===0||i===pptSlides.length-1?"#F0F4FF":"#0F172A",lineHeight:1.3,marginBottom:3}}>{s.heading}</div>
                      <div style={{fontSize:10,color:"#94A3B8",lineHeight:1.35}}>{(s.body||"").slice(0,55)}{(s.body||"").length>55?"…":""}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* ── IMAGES (Unsplash) ── */}
        {step>=3&&(
          <div style={card}>
            <h2 style={{margin:"0 0 4px",fontSize:18,color:"#0F172A"}}>🖼️ Stock Photos — Unsplash</h2>
            <p style={{margin:"0 0 12px",fontSize:13,color:"#64748B"}}>Search millions of free professional photos — no API key required to search</p>
            <div style={{display:"flex",gap:9,flexWrap:"wrap"}}>
              <input type="text" value={imgQuery} onChange={e=>setImgQuery(e.target.value)} onKeyDown={e=>e.key==="Enter"&&searchImages()} placeholder="e.g. leadership, technology, startup..." style={{...inp,flex:1,minWidth:180}}/>
              <button style={{...bV,opacity:busy.img||!imgQuery.trim()?0.6:1}} onClick={searchImages} disabled={busy.img||!imgQuery.trim()}>
                {busy.img?<><Spin/>Searching...</>:"🔍 Search Photos"}
              </button>
            </div>
            {msgs.img&&<Notice type="error">{msgs.img}</Notice>}
            {photos.length>0&&(
              <div style={{marginTop:14}}>
                <div style={{fontSize:12,color:"#64748B",marginBottom:9}}>Click photo to select · Blue button to download</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:9}}>
                  {photos.map((ph,i)=>(
                    <div key={i} onClick={()=>setPickedImg(ph)} style={{borderRadius:10,overflow:"hidden",cursor:"pointer",border:`3px solid ${pickedImg===ph?"#0A66C2":"transparent"}`,transition:"border .15s"}}>
                      <img src={ph.thumb} alt="stock" style={{width:"100%",height:110,objectFit:"cover",display:"block"}}
                        onError={e=>{e.target.src=`https://source.unsplash.com/400x250/?${imgQuery}&sig=${i}${Date.now()}`;}}/>
                      <div style={{padding:"6px 8px",background:"#F8FAFC",borderTop:"1px solid #E2E8F0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <span style={{fontSize:10,color:"#64748B",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:120}}>📷 {ph.photographer}</span>
                        <a href={ph.download} download="photo.jpg" target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{background:"#0A66C2",color:"#fff",border:"none",borderRadius:6,padding:"3px 8px",fontSize:10,cursor:"pointer",fontWeight:700,textDecoration:"none"}}>↓</a>
                      </div>
                    </div>
                  ))}
                </div>
                {pickedImg&&(
                  <div style={{marginTop:12,padding:"10px 14px",background:"#EFF6FF",borderRadius:10,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                    <img src={pickedImg.thumb} style={{width:60,height:40,objectFit:"cover",borderRadius:6}} alt="selected"/>
                    <div style={{flex:1,fontSize:13,color:"#1D4ED8"}}>✓ Selected · Photo by <strong>{pickedImg.photographer}</strong> on Unsplash</div>
                    <a href={pickedImg.download} download="linkedin-cover.jpg" target="_blank" rel="noopener noreferrer" style={{...bG,textDecoration:"none"}}>⬇ Download</a>
                  </div>
                )}
                <div style={{marginTop:8,fontSize:11,color:"#94A3B8"}}>Photos by <a href="https://unsplash.com" target="_blank" rel="noopener noreferrer" style={{color:"#0A66C2"}}>Unsplash</a></div>
              </div>
            )}
          </div>
        )}

        {step>=3&&<div style={{textAlign:"center",marginTop:4,marginBottom:20}}><button style={bO} onClick={reset}>🔄 Start a New Post</button></div>}

      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   ROOT
══════════════════════════════════════ */
function App() {
  const [view, setView] = useState("landing");
  return view==="landing" ? <Landing onLaunch={()=>setView("tool")}/> : <Tool onHome={()=>setView("landing")}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
