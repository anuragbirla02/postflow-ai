/* ─── Gemini Text ─── */
async function aiText(prompt, key) {
  if (!key) throw new Error("Please save your Gemini API key first.");
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`,
    { method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ contents:[{ parts:[{ text:prompt }] }] }) }
  );
  const d = await res.json();
  if (d.error) throw new Error(d.error.message);
  return d.candidates?.[0]?.content?.parts?.[0]?.text || "";
}

/* ─── Gemini Image (Option B) ─── */
async function geminiImage(prompt, key) {
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-preview-image-generation:generateContent?key=${key}`,
    { method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        contents:[{ parts:[{ text: prompt }] }],
        generationConfig:{ responseModalities:["TEXT","IMAGE"] }
      })
    }
  );
  const d = await res.json();
  if (d.error) throw new Error(d.error.message);
  const parts = d.candidates?.[0]?.content?.parts || [];
  const img = parts.find(p => p.inlineData?.mimeType?.startsWith("image/"));
  if (!img) throw new Error("No image returned from Gemini");
  return "data:" + img.inlineData.mimeType + ";base64," + img.inlineData.data;
}

/* ─── Pollinations Image (Option C — no key, no login) ─── */
function pollinationsUrl(prompt) {

}

/* ─── JSON Parser ─── */
function parseJSON(raw) {
  try { return JSON.parse(raw.replace(/```json|```/g,"").trim()); }
  catch {
    const m = raw.match(/\[[\s\S]*\]|\{[\s\S]*\}/);
    if (m) try { return JSON.parse(m[0]); } catch {}
    return null;
  }
}

      sl.background = { color: C.navy };

  return await pres.write({ outputType:"blob" });
}

  async function draftFromOwnIdea() {
    if (!userDraft.trim()) { sm("draft","⚠️ Write your idea or draft in the box first."); return; }
    var t = { title:userDraft.trim().slice(0,60), hook:"Your draft", why:"Your idea", emoji:"✍️", angle:"own-draft" };
    pick(t);
    setTopics([]); setStep(2);
    await draftPost(false);
  }

  async function genPPT() {
    if (!window.PptxGenJS) { sm("ppt","❌ PPT library not loaded. Please refresh the page."); return; }
    sb("ppt",true); sm("ppt","🤖 AI is crafting your slides...");
    try {
      var topicTitle = (selected ? selected.title : null) || userDraft.trim().slice(0,60) || "LinkedIn Insights";
      var raw = await aiText('Create a professional 6-slide LinkedIn carousel about: "' + topicTitle + '"\nReturn ONLY valid JSON:\n{"title":"carousel title max 8 words","slides":[\n{"heading":"title slide heading","body":"subtitle"},\n{"heading":"slide heading","body":"45-55 words","label":"Section","stat":"73%","statLabel":"what this means in 2-3 words","takeaway":"key insight 10 words"},\n{"heading":"slide heading","body":"45-55 words","label":"Section","tip":"actionable tip 30-40 words","takeaway":"key insight 10 words"},\n{"heading":"slide heading","body":"45-55 words","label":"Section","stat":"another stat","statLabel":"explanation","takeaway":"key insight 10 words"},\n{"heading":"slide heading","body":"45-55 words","label":"Section","tip":"another tip","takeaway":"key insight 10 words"},\n{"heading":"CTA heading","body":"follow message 20-30 words"}\n]}', geminiKey);
      var parsed = parseJSON(raw);
      if (!parsed || !parsed.slides || parsed.slides.length < 6) { sm("ppt","⚠️ Could not parse slides. Please try again."); sb("ppt",false); return; }
      setPptSlides(parsed.slides);
      sm("ppt","📊 Rendering your PowerPoint...");
      var blob = await buildPPTX(parsed.slides, parsed.title || topicTitle);
      setPptBlob(blob);
      sm("ppt","✅ Done! Click the green Download button.");
    } catch(e) { sm("ppt","❌ " + e.message); }
    sb("ppt",false);
  }

  function dlPPT() {
    if (!pptBlob) return;
    var url = URL.createObjectURL(pptBlob);
    var a = document.createElement("a");
    a.href = url;
    a.download = ((selected ? selected.title : "carousel") || "carousel").slice(0,40).replace(/[^a-z0-9]/gi,"-") + ".pptx";
    a.click(); URL.revokeObjectURL(url);
  }

  async function autoPrompt() {
    sb("imgPrompt",true);
    try {
      var topic = (selected ? selected.title : null) || userDraft.trim().slice(0,60) || "professional LinkedIn";
      var p = await aiText('Write a concise image generation prompt for a LinkedIn cover about: "' + topic + '".\nStyle: modern, minimal, professional. No text/words in image. 16:9 landscape.\nInclude: color palette (dark navy/blue), mood, lighting, key visual elements.\nReturn ONLY the prompt in 1-2 sentences.', geminiKey);
      setImgPrompt(p.trim());
    } catch(e) { sm("img","❌ Could not generate prompt: " + e.message); }
    sb("imgPrompt",false);
  }

  async function generateImg() {
    if (!imgPrompt.trim()) return;
    setGenImgSrc(null); setImgUsed("");
    sb("img",true); sm("img","");
    if (imgMode === "gemini") {
      if (!geminiKey) {
        sm("img","⚠️ No Gemini key — switching to Pollinations...");
        await runPollinations();
      } else {
        try {
          sm("img","🤖 Generating with Gemini AI... (~15-25s)");
          var src = await geminiImage(imgPrompt.trim(), geminiKey);
          setGenImgSrc(src); setImgUsed("Gemini AI");
          sm("img","✅ Generated with Gemini!");
        } catch(e) {
          sm("img","⚠️ Gemini image not available — switching to Pollinations (free fallback)...");
          await runPollinations();
        }
      }
    } else {
      await runPollinations();
    }
    sb("img",false);
  }

  async function runPollinations() {
    sm("img","🎨 Generating with Pollinations FLUX... (~15-20s)");
    var url = pollinationsUrl(imgPrompt.trim());
    try {
      await new Promise(function(resolve, reject) {
        var img = new Image();
        img.onload = resolve;
        img.onerror = function(){ reject(new Error("Image failed to load")); };
        img.src = url;
      });
      setGenImgSrc(url); setImgUsed("Pollinations FLUX");
      sm("img","✅ Generated! Free — no key needed.");
    } catch(e) {
      sm("img","❌ Both services failed. Check your internet or try rephrasing the prompt.");
    }
  }

  function downloadImg() {
    if (!genImgSrc) return;
    if (genImgSrc.startsWith("data:")) {
      var a = document.createElement("a"); a.href = genImgSrc; a.download = "linkedin-cover.png"; a.click();
    } else {
      window.open(genImgSrc, "_blank");
    }
  }

  function copyAll() {
    navigator.clipboard.writeText(post + (tags ? "\n\n" + tags : ""));
    setCopied(true); setTimeout(function(){ setCopied(false); }, 2200);
  }

  function reset() {
    setStep(1); setDomain(""); setCustom(""); setUserDraft(""); setTopics([]); setSelected(null);
    setPost(""); setTags(""); setPptSlides(null); setPptBlob(null);
    setGenImgSrc(null); setImgPrompt(""); setImgUsed(""); setMsgs({}); setShowChange(false); setChangeReq("");
  }

  var card = {background:"#fff",borderRadius:20,padding:"22px 26px",boxShadow:"0 2px 14px rgba(0,0,0,.06)",marginBottom:16,animation:"pfup .3s ease"};
  var bb   = {border:"none",borderRadius:50,fontWeight:700,cursor:"pointer",transition:"all .18s",fontSize:13,display:"inline-flex",alignItems:"center",gap:6,padding:"10px 20px"};
  var bP   = Object.assign({},bb,{background:"#0A66C2",color:"#fff"});
  var bO   = Object.assign({},bb,{background:"#fff",color:"#0A66C2",border:"2px solid #0A66C2"});
  var bG   = Object.assign({},bb,{background:"#16A34A",color:"#fff"});
  var bV   = Object.assign({},bb,{background:"#7C3AED",color:"#fff"});
  var bA   = Object.assign({},bb,{background:"#F59E0B",color:"#fff"});
  var inp  = {padding:"10px 13px",border:"1.5px solid #E2E8F0",borderRadius:11,fontSize:14,outline:"none",width:"100%",color:"#1E293B",background:"#fff"};
  var ta   = Object.assign({},inp,{resize:"vertical",lineHeight:1.7});

  return (
    <div style={{fontFamily:"'Segoe UI',system-ui,sans-serif",background:"#F1F5F9",minHeight:"100vh",paddingBottom:70}}>

      {/* Topbar */}
      <div style={{background:"#0A0F1E",padding:"12px 22px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontWeight:900,fontSize:17,color:"#fff"}}>⚡ PostFlow<span style={{color:"#38BDF8"}}> AI</span></div>
        <div style={{display:"flex",gap:7}}>
          <button onClick={reset} style={{background:"transparent",border:"1px solid #334155",color:"#94A3B8",padding:"5px 13px",borderRadius:50,fontSize:11,cursor:"pointer"}}>🔄 New Post</button>
          <button onClick={onHome} style={{background:"transparent",border:"1px solid #334155",color:"#94A3B8",padding:"5px 13px",borderRadius:50,fontSize:11,cursor:"pointer"}}>← Home</button>
        </div>
      </div>

      {/* Progress */}
      <div style={{background:"#fff",borderBottom:"1px solid #E2E8F0",padding:"12px 0"}}>
        <div style={{maxWidth:700,margin:"0 auto",padding:"0 20px",display:"flex",alignItems:"center"}}>
          {["Keys","Idea / Topic","Post","Assets"].map(function(s,i){
            var n=i+1,done=step>n,active=step===n;
            return (
              <React.Fragment key={s}>
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                  <div style={{width:26,height:26,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:11,background:done?"#0A66C2":active?"#fff":"#F1F5F9",color:done?"#fff":active?"#0A66C2":"#94A3B8",border:active?"2px solid #0A66C2":"none",transition:"all .3s"}}>{done?"✓":n}</div>
                  <span style={{fontSize:10,color:active?"#0A66C2":"#94A3B8",fontWeight:active?700:400,whiteSpace:"nowrap"}}>{s}</span>
                </div>
                {i<3 && <div style={{flex:1,height:2,background:step>n?"#0A66C2":"#E2E8F0",margin:"0 5px",marginBottom:14,transition:"background .4s"}}/>}
              </React.Fragment>
            );
          })}
        </div>
      </div>

      <div style={{maxWidth:700,margin:"20px auto 0",padding:"0 16px"}}>

        {/* ── KEYS ── */}
        <div style={card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
            <div>
              <h2 style={{margin:"0 0 4px",fontSize:18,color:"#0F172A"}}>🔑 Gemini API Key</h2>
              <p style={{margin:0,color:"#64748B",fontSize:13}}>Your key stays in your browser only — never sent anywhere except Google.</p>
            </div>
            {keysSaved && <span style={{background:"#F0FDF4",color:"#15803D",fontSize:12,fontWeight:700,padding:"4px 12px",borderRadius:20}}>✓ Saved</span>}
          </div>
          <div style={{marginTop:14,position:"relative"}}>
            <input type={showKey?"text":"password"} placeholder="AIza..." value={geminiKey}
              onChange={function(e){ setGeminiKey(e.target.value); setKeysSaved(false); sm("keys",""); }} style={inp}/>
            <button onClick={function(){ setShowKey(function(p){return !p;}); }} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:14}}>{showKey?"🙈":"👁️"}</button>
          </div>
          <div style={{marginTop:6,fontSize:12,color:"#94A3B8"}}>
            Get your free key at <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener noreferrer" style={{color:"#0A66C2"}}>aistudio.google.com/app/apikey</a> → Sign in → Create API Key
          </div>
          <button style={Object.assign({},bP,{marginTop:14})} onClick={saveKeys}>Save & Continue →</button>
          {msgs.keys && <Notice type={msgs.keys.startsWith("✅")?"success":"warn"}>{msgs.keys}</Notice>}
        </div>

        {/* ── IDEA / DRAFT ── */}
        <div style={card}>
          <h2 style={{margin:"0 0 4px",fontSize:18,color:"#0F172A"}}>💡 Your Idea or Draft</h2>
          <p style={{margin:"0 0 12px",color:"#64748B",fontSize:13}}>
            Have a rough idea or existing draft? Paste it here — AI will polish it.<br/>
            <span style={{color:"#94A3B8"}}>Or leave blank and use AI topic suggestions below.</span>
          </p>
          <textarea value={userDraft} onChange={function(e){setUserDraft(e.target.value);}} placeholder={"Examples:\n• 'I want to write about growing LinkedIn to 5k followers in 6 months'\n• A rough draft you already wrote\n• Key points or bullet notes you want covered"} style={Object.assign({},ta,{minHeight:110,background:"#FAFCFF",border:"1.5px solid #BFDBFE"})}/>
          {userDraft.trim() && (
            <div style={{marginTop:10,display:"flex",gap:9,flexWrap:"wrap",alignItems:"center"}}>
              <button style={Object.assign({},bA,{opacity:busy.post?0.6:1})} onClick={draftFromOwnIdea} disabled={busy.post}>
                {busy.post ? <React.Fragment><Spin/>Enhancing...</React.Fragment> : "✨ Polish & Enhance My Draft"}
              </button>
              <span style={{fontSize:12,color:"#64748B"}}>or pick a niche below for topic ideas</span>
            </div>
          )}
          {msgs.draft && <Notice type="warn">{msgs.draft}</Notice>}
        </div>

        {/* ── DOMAIN + TOPIC ── */}
        <div style={card}>
          <h2 style={{margin:"0 0 4px",fontSize:18,color:"#0F172A"}}>🎯 Domain & Topic</h2>
          <p style={{margin:"0 0 14px",color:"#64748B",fontSize:13}}>
            Pick a niche for AI suggestions · or type a topic and draft directly
            {userDraft.trim() && <span style={{color:"#0A66C2"}}> · Your draft above will add context</span>}
          </p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
            <div>
              <label style={{fontSize:11,fontWeight:700,color:"#64748B",display:"block",marginBottom:5,textTransform:"uppercase"}}>Select Domain</label>
              <select value={domain} onChange={function(e){ setDomain(e.target.value); setTopics([]); setSelected(null); }} style={Object.assign({},inp,{cursor:"pointer"})}>
                <option value="">— Choose your niche —</option>
                {DOMAINS.map(function(d){ return <option key={d} value={d}>{d}</option>; })}
              </select>
            </div>
            <div>
              <label style={{fontSize:11,fontWeight:700,color:"#64748B",display:"block",marginBottom:5,textTransform:"uppercase"}}>Or Type a Topic</label>
              <input type="text" placeholder="e.g. How I grew to 10k followers..." value={custom}
                onChange={function(e){setCustom(e.target.value);}}
                onKeyDown={function(e){if(e.key==="Enter")useDirect();}}
                style={inp}/>
            </div>
          </div>
          <div style={{display:"flex",gap:9,flexWrap:"wrap"}}>
            <button style={Object.assign({},bP,{opacity:(!domain&&!custom.trim())||busy.topics?0.6:1})} onClick={getTopics} disabled={busy.topics||(!domain&&!custom.trim())}>
              {busy.topics ? <React.Fragment><Spin/>Finding topics...</React.Fragment> : "🔥 Get AI Topic Ideas"}
            </button>
            {custom.trim() && <button style={bO} onClick={useDirect}>✍️ Use This Topic Directly</button>}
          </div>
          {msgs.topics && <Notice type="error">{msgs.topics}</Notice>}
        </div>

        {/* ── TOPIC LIST ── */}
        {step >= 2 && topics.length > 0 && (
          <div style={card}>
            <h2 style={{margin:"0 0 4px",fontSize:18,color:"#0F172A"}}>🔥 AI Topic Suggestions</h2>
            <p style={{margin:"0 0 14px",color:"#64748B",fontSize:13}}>Click one to select</p>
            {topics.map(function(t,i){
              return (
                <div key={i} onClick={function(){pick(t);}}
                  style={{border:"2px solid " + (selected===t?"#0A66C2":"#E2E8F0"),borderRadius:13,padding:"13px 15px",cursor:"pointer",background:selected===t?"#EFF6FF":"#FAFCFF",marginBottom:9,transition:"all .2s"}}>
                  <div style={{display:"flex",justifyContent:"space-between"}}>
                    <div style={{fontWeight:700,color:"#0F172A",fontSize:14}}>{t.emoji} {t.title}</div>
                    {selected === t && <span style={{color:"#0A66C2"}}>✓</span>}
                  </div>
                  <div style={{fontSize:12,color:"#475569",marginTop:4}}>💡 {t.hook}</div>
                  <div style={{display:"flex",gap:12,marginTop:5,flexWrap:"wrap"}}>
                    <span style={{fontSize:12,color:"#0A66C2"}}>📈 {t.why}</span>
                    {t.angle && <span style={{fontSize:12,color:"#7C3AED"}}>🎯 {t.angle}</span>}
                  </div>
                </div>
              );
            })}
            {selected && (
              <button style={Object.assign({},bP,{marginTop:8,opacity:busy.post?0.6:1})} onClick={function(){draftPost(false);}} disabled={busy.post}>
                {busy.post ? <React.Fragment><Spin/>Drafting...</React.Fragment> : "✍️ Draft My Post →"}
              </button>
            )}
            {msgs.post && <Notice type="error">{msgs.post}</Notice>}
          </div>
        )}

        {/* Custom topic card */}
        {step >= 2 && selected && topics.length === 0 && selected.angle !== "own-draft" && (
          <div style={card}>
            <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:15,color:"#0F172A"}}>{selected.emoji} {selected.title}</div>
                <div style={{fontSize:13,color:"#64748B",marginTop:3}}>Your custom topic — ready to draft</div>
              </div>
              <button style={Object.assign({},bP,{opacity:busy.post?0.6:1})} onClick={function(){draftPost(false);}} disabled={busy.post}>
                {busy.post ? <React.Fragment><Spin/>Drafting...</React.Fragment> : "✍️ Draft My Post →"}
              </button>
            </div>
            {msgs.post && <Notice type="error">{msgs.post}</Notice>}
          </div>
        )}

        {/* ── POST EDITOR ── */}
        {step >= 3 && post && (
          <div style={card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
              <div>
                <h2 style={{margin:0,fontSize:18,color:"#0F172A"}}>✍️ Your LinkedIn Post</h2>
                <p style={{margin:"3px 0 0",fontSize:13,color:"#64748B"}}>Edit freely · Ask AI to make changes below</p>
              </div>
              <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                <button style={bO} onClick={copyAll}>{copied ? "✅ Copied!" : "📋 Copy + Hashtags"}</button>
                <a href="https://www.linkedin.com/feed/" target="_blank" rel="noopener noreferrer" style={{textDecoration:"none"}}>
                  <button style={bP}>Open LinkedIn →</button>
                </a>
              </div>
            </div>
            <textarea value={post} onChange={function(e){setPost(e.target.value);}} style={Object.assign({},ta,{minHeight:220})}/>
            {tags && <div style={{marginTop:10,padding:"10px 14px",background:"#EFF6FF",borderRadius:10,fontSize:13,color:"#1D4ED8"}}>{tags}</div>}
            <div style={{marginTop:7,fontSize:12,color:"#94A3B8"}}>{post.split(/\s+/).filter(Boolean).length} words</div>

            {/* AI Changes */}
            <div style={{marginTop:18,borderTop:"1px solid #E2E8F0",paddingTop:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div>
                  <div style={{fontWeight:700,fontSize:14,color:"#0F172A"}}>🤖 Ask AI to Make Changes</div>
                  <div style={{fontSize:12,color:"#64748B",marginTop:2}}>Tell AI what to change — it rewrites instantly</div>
                </div>
                <button onClick={function(){setShowChange(function(p){return !p;});}} style={Object.assign({},bO,{padding:"6px 14px",fontSize:12})}>
                  {showChange ? "▲ Hide" : "✏️ Request Changes"}
                </button>
              </div>
              {showChange && (
                <div style={{animation:"pfup .2s ease"}}>
                  <textarea value={changeReq} onChange={function(e){setChangeReq(e.target.value);}}
                    placeholder={"Examples:\n• Make the hook more punchy and attention-grabbing\n• Shorten to under 150 words\n• Add more personal story, less advice\n• Make the tone more conversational / add humor\n• Change the CTA to ask people to comment"}
                    style={Object.assign({},ta,{minHeight:90,background:"#FAFCFF",border:"1.5px solid #BFDBFE"})}/>
                  <div style={{display:"flex",gap:9,marginTop:10,flexWrap:"wrap"}}>
                    <button style={Object.assign({},bA,{opacity:(!changeReq.trim()||busy.post)?0.6:1})}
                      onClick={function(){draftPost(true);}} disabled={!changeReq.trim()||busy.post}>
                      {busy.post ? <React.Fragment><Spin/>Rewriting...</React.Fragment> : "✨ Apply Changes with AI"}
                    </button>
                    <button style={Object.assign({},bO,{padding:"10px 16px"})} onClick={function(){setShowChange(false);setChangeReq("");}}>Cancel</button>
                  </div>
                </div>
              )}
            </div>
          </div>
        )}

        {/* ── PPT ── */}
        {step >= 3 && (
          <div style={card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10,marginBottom:12}}>
              <div>
                <h2 style={{margin:"0 0 4px",fontSize:18,color:"#0F172A"}}>📊 Advanced Carousel PPT</h2>
                <p style={{margin:0,fontSize:13,color:"#64748B"}}>Pro-grade 6-slide .pptx · stats, tips, gradients · upload to LinkedIn</p>
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {!pptBlob
                  ? <button style={Object.assign({},bO,{opacity:busy.ppt?0.6:1})} onClick={genPPT} disabled={busy.ppt}>
                      {busy.ppt ? <React.Fragment><Spin color="#0A66C2"/>Building...</React.Fragment> : "⚡ Generate PPT"}
                    </button>
                  : <React.Fragment>
                      <button style={Object.assign({},bO,{opacity:busy.ppt?0.6:1})} onClick={genPPT} disabled={busy.ppt}>↺ Redo</button>
                      <button style={bG} onClick={dlPPT}>⬇ Download .pptx</button>
                    </React.Fragment>
                }
              </div>
            </div>
            {msgs.ppt && <Notice type={msgs.ppt.startsWith("✅")?"success":msgs.ppt.startsWith("❌")?"error":"warn"}>{msgs.ppt}</Notice>}
            {pptSlides && (
              <div style={{marginTop:14,display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(148px,1fr))",gap:9}}>
                {pptSlides.map(function(s,i){
                  var isT=i===0, isL=i===pptSlides.length-1;
                  return (
                    <div key={i} style={{border:"1px solid #E2E8F0",borderRadius:10,overflow:"hidden",background:isT||isL?"#0A1628":"#fff"}}>
                      <div style={{background:isT||isL?"#0A66C2":"#0A66C2",height:4}}/>
                      <div style={{padding:"9px 11px"}}>
                        <div style={{fontSize:9,color:isT||isL?"#38BDF8":"#0A66C2",fontWeight:800,marginBottom:3,textTransform:"uppercase"}}>{isT?"📌 Cover":isL?"🎯 CTA":"💡 Slide "+i}</div>
                        <div style={{fontWeight:700,fontSize:11,color:isT||isL?"#F0F4FF":"#0F172A",lineHeight:1.3,marginBottom:3}}>{s.heading}</div>
                        <div style={{fontSize:10,color:"#94A3B8",lineHeight:1.35}}>{(s.body||"").slice(0,55)}{(s.body||"").length>55?"…":""}</div>
                        {s.stat && <div style={{marginTop:4,fontSize:13,fontWeight:900,color:"#0A66C2"}}>{s.stat}</div>}
                        {s.tip && <div style={{marginTop:3,fontSize:9,color:"#7C3AED"}}>💡 Pro Tip</div>}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* ── AI IMAGE GENERATION ── */}
        {step >= 3 && (
          <div style={card}>
            <h2 style={{margin:"0 0 4px",fontSize:18,color:"#0F172A"}}>🎨 AI Cover Image</h2>
            <p style={{margin:"0 0 14px",fontSize:13,color:"#64748B"}}>
              Generate a professional AI image for your post — completely free.<br/>
              <span style={{color:"#94A3B8",fontSize:12}}>Gemini uses your existing key · Pollinations needs no key at all</span>
            </p>

            {/* Mode toggle */}
            <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
              {[
                {id:"gemini",       label:"🤖 Gemini AI",          sub:"Uses your Gemini key · Falls back to Pollinations if unavailable"},
                {id:"pollinations", label:"🌸 Pollinations FLUX",   sub:"100% free · No key · No login · Always works"},
              ].map(function(m){
                return (
                  <div key={m.id} onClick={function(){setImgMode(m.id);}}
                    style={{flex:1,minWidth:170,padding:"12px 16px",border:"2px solid "+(imgMode===m.id?"#0A66C2":"#E2E8F0"),borderRadius:14,cursor:"pointer",background:imgMode===m.id?"#EFF6FF":"#FAFCFF",transition:"all .2s"}}>
                    <div style={{fontWeight:700,fontSize:14,color:imgMode===m.id?"#0A66C2":"#0F172A"}}>{m.label}</div>
                    <div style={{fontSize:11,color:"#64748B",marginTop:3}}>{m.sub}</div>
                  </div>
                );
              })}
            </div>

            {/* Prompt */}
            <div style={{marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <label style={{fontSize:11,fontWeight:700,color:"#64748B",textTransform:"uppercase",letterSpacing:.5}}>Image Prompt</label>
                <button style={Object.assign({},bO,{fontSize:11,padding:"5px 12px",opacity:busy.imgPrompt?0.6:1})} onClick={autoPrompt} disabled={busy.imgPrompt}>
                  {busy.imgPrompt ? <React.Fragment><Spin color="#0A66C2"/>Writing...</React.Fragment> : "✨ Auto-write from topic"}
                </button>
              </div>
              <textarea value={imgPrompt} onChange={function(e){setImgPrompt(e.target.value);}}
                placeholder={"Describe the image you want...\n\nExample: 'Professional LinkedIn cover for AI leadership topic. Dark navy background, abstract neural network, blue accent lighting, modern minimal, no text in image'"}
                style={Object.assign({},ta,{minHeight:90,background:"#FAFCFF",border:"1.5px solid #BFDBFE"})}/>
            </div>

            <button style={Object.assign({},bV,{fontSize:14,padding:"12px 26px",opacity:!imgPrompt.trim()||busy.img?0.6:1})}
              onClick={generateImg} disabled={!imgPrompt.trim()||busy.img}>
              {busy.img ? <React.Fragment><Spin/>Generating image...</React.Fragment> : "🎨 Generate Cover Image"}
            </button>

            {msgs.img && <Notice type={msgs.img.startsWith("✅")?"success":msgs.img.startsWith("❌")?"error":"warn"}>{msgs.img}</Notice>}

            {genImgSrc && (
              <div style={{marginTop:16,animation:"pfup .3s ease"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,flexWrap:"wrap",gap:8}}>
                  <span style={{fontSize:12,color:"#64748B"}}>✅ Generated with <strong style={{color:"#0A66C2"}}>{imgUsed}</strong></span>
                  <div style={{display:"flex",gap:8}}>
                    <button style={Object.assign({},bO,{fontSize:12,padding:"6px 14px",opacity:busy.img?0.6:1})} onClick={generateImg} disabled={busy.img}>🔄 Regenerate</button>
                    <button style={Object.assign({},bG,{fontSize:12,padding:"6px 14px"})} onClick={downloadImg}>⬇ Download</button>
                  </div>
                </div>
                <img src={genImgSrc} alt="AI generated cover"
                  style={{width:"100%",borderRadius:14,border:"1px solid #E2E8F0",boxShadow:"0 4px 20px rgba(0,0,0,.08)",display:"block"}}/>
                <div style={{marginTop:8,fontSize:11,color:"#94A3B8"}}>💡 Download and attach to your LinkedIn post for higher engagement</div>
              </div>
            )}
          </div>
        )}

        {step >= 3 && (
          <div style={{textAlign:"center",marginTop:4,marginBottom:20}}>
            <button style={bO} onClick={reset}>🔄 Start a New Post</button>
          </div>
        )}

      </div>
    </div>
  );
}

/* ─── Root ─── */
function App() {
  var [view, setView] = useState("landing");
  if (view === "landing") return React.createElement(Landing, { onLaunch: function(){ setView("tool"); } });
  return React.createElement(Tool, { onHome: function(){ setView("landing"); } });
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
