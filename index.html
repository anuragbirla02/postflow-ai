const DOMAINS=["Tech & AI","Data Science","Web Development","Product Management","Business Strategy","Marketing & Growth","Finance & Investing","Leadership","Startups","Career Growth","Cybersecurity","UX & Design","DevOps & Cloud","Blockchain","Healthcare & MedTech"];
const POST_TONES=[{id:"story",label:"📖 Story",desc:"Personal journey & lessons"},{id:"insight",label:"💡 Hot Take",desc:"Contrarian opinion + data"},{id:"list",label:"📋 List Post",desc:"5-7 actionable tips"},{id:"question",label:"❓ Conversation",desc:"Question that sparks replies"},{id:"data",label:"📊 Data Drop",desc:"Stats + your analysis"},{id:"mistake",label:"❌ Mistake",desc:"Failure you learned from"}];
const PPT_THEMES=[{id:"midnight",label:"🌙 Midnight",colors:{bg:"0A0F1E",card:"0F1729",accent:"38BDF8",brand:"2563EB",text:"F0F4FF",sub:"94A3B8",stat:"38BDF8",dark:true}},{id:"aurora",label:"🔮 Aurora",colors:{bg:"0D0A1E",card:"1A1033",accent:"A78BFA",brand:"7C3AED",text:"F5F3FF",sub:"C4B5FD",stat:"A78BFA",dark:true}},{id:"solar",label:"☀️ Solar",colors:{bg:"FFFBEB",card:"FFFFFF",accent:"F59E0B",brand:"D97706",text:"1C1917",sub:"78716C",stat:"D97706",dark:false}},{id:"neon",label:"⚡ Neon",colors:{bg:"030712",card:"111827",accent:"22D3EE",brand:"06B6D4",text:"ECFEFF",sub:"67E8F9",stat:"22D3EE",dark:true}},{id:"forest",label:"🌿 Forest",colors:{bg:"F0FDF4",card:"FFFFFF",accent:"10B981",brand:"059669",text:"052E16",sub:"4B7C5F",stat:"059669",dark:false}},{id:"crimson",label:"🔥 Crimson",colors:{bg:"1C0A0A",card:"2D1515",accent:"F87171",brand:"EF4444",text:"FFF1F2",sub:"FCA5A5",stat:"F87171",dark:true}}];
const SCHED_TIMES=["8:00 AM","9:00 AM","10:00 AM","12:00 PM","1:00 PM","3:00 PM","5:00 PM","7:00 PM","8:00 PM"];
const BEST_DAYS=["Monday","Tuesday","Wednesday","Thursday","Friday"];

/* ── AI ── */
async function aiText(prompt,key){
  if(!key)throw new Error("Save your Gemini key first");
  const res=await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key="+key,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.85,topP:0.95}})});
  const d=await res.json();
  if(d.error)throw new Error(d.error.message);
  return d.candidates?.[0]?.content?.parts?.[0]?.text||"";
}
async function aiImage(prompt,key,mode){
  if(mode==="gemini"&&key){
    try{
      const res=await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-preview-image-generation:generateContent?key="+key,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{responseModalities:["TEXT","IMAGE"]}})});
      const d=await res.json();
      if(!d.error){const parts=d.candidates?.[0]?.content?.parts||[];const img=parts.find(p=>p.inlineData?.mimeType?.startsWith("image/"));if(img)return{src:"data:"+img.inlineData.mimeType+";base64,"+img.inlineData.data,service:"Gemini AI"};}
    }catch(e){console.warn("Gemini img failed");}
  }
  const seed=Math.floor(Math.random()*99999);
  const url="https://image.pollinations.ai/prompt/"+encodeURIComponent(prompt+", ultra HD, cinematic, professional, no text, no watermark")+"?width=1200&height=675&model=flux&nologo=true&seed="+seed;
  return{src:url,service:"Pollinations FLUX (AI)"};
}
function parseJSON(raw){
  try{return JSON.parse(raw.replace(/```json\n?|```\n?/g,"").trim());}
  catch{const m=raw.match(/\{[\s\S]*\}|\[[\s\S]*\]/);if(m)try{return JSON.parse(m[0]);}catch{}return null;}
}

/* ── SMART PROMPTS ── */
const LINKEDIN_SYSTEM=`You are a LinkedIn content strategist. You know that:
- Pattern-interrupt hooks outperform question hooks 3x
- Best performing posts: 150-220 words, blank lines between ideas, one idea per line
- Personal vulnerability drives comments, data drives shares, lists drive saves
- Never use "I'm excited to share", "game-changer", "thrilled to announce", em-dashes
- The LinkedIn algorithm rewards engagement in the first 60 minutes after posting`;

function topicPrompt(domain,custom,ctx,tone){
  const tg={story:"personal stories with unexpected turns",insight:"hot takes challenging conventional wisdom",list:"practical numbered frameworks people save",question:"polarizing questions splitting opinions",data:"surprising statistics with contrarian takes",mistake:"honest failures that teach lessons"}[tone]||"viral posts";
  return LINKEDIN_SYSTEM+"\n\nGenerate 6 high-engagement LinkedIn ideas for "+(custom?`topic: "${custom}"`:`domain: "${domain}"`)+". Context: "+ctx+"\nFocus: "+tg+"\n\nReturn ONLY JSON array:\n[{\"title\":\"specific topic\",\"hook\":\"exact first line under 12 words, no questions\",\"why\":\"why high engagement now\",\"angle\":\"unique insight\",\"emoji\":\"one emoji\",\"engagement_type\":\"comment|share|save\",\"estimated_reach\":\"low|medium|high|viral\"}]";
}

function postPrompt(topic,tone,ctx,angle){
  const tf={
    story:`Structure: Bold pattern-interrupt hook (NOT a question) → blank line → 3-4 lines personal story (one idea per line) → blank line → "Here's what I learned:" → 3 numbered lessons (action verb, max 1.5 lines each) → blank line → CTA asking for THEIR story`,
    insight:`Structure: Controversial claim (max 10 words) → blank line → "Here's what most miss:" → 3-4 lines argument → blank line → counter-argument 1 line → your rebuttal 2 lines → blank line → polarizing yes/no question`,
    list:`Structure: "X things [audience] should do instead of [mistake]:" → blank line → 5-7 numbered insights (Bold concept: brief explanation) → blank line → "Bonus:" one surprising insight → blank line → "Save this."`,
    question:`Structure: Question with no right answer → blank line → your answer 4-5 lines (vulnerable, specific) → blank line → "I've seen both sides:" + 2 perspectives → blank line → "What's your take?"`,
    data:`Structure: Surprising stat as shock opener → blank line → 2-3 lines WHY it matters → blank line → "What the data doesn't tell you:" → 3 lines your analysis → blank line → practical implication → "Has this been your experience?"`,
    mistake:`Structure: The mistake upfront, no buildup → blank line → what happened (2-3 specific lines) → blank line → "The moment I realized:" → turning point 2 lines → blank line → 3 things you'd do differently → blank line → "Still figuring it out."`
  };
  return LINKEDIN_SYSTEM+"\n\nWrite a LinkedIn post about: \""+topic+"\"\nAngle: "+angle+"\n"+(ctx?`Creator context: "${ctx}"\n`:"")+"\n"+tf[tone]+"\n\nRULES: Under 230 words. No corporate jargon. No em-dashes. Imperfect sentences ok. First person. Feel like written at 11pm on a phone.\n\nReturn ONLY the post text.";
}

function pptPrompt(topic,post,tone){
  return `Create a 6-slide LinkedIn carousel for: "${topic}"\n${post?"Source post excerpt:\n\""+post.slice(0,300)+"\"\n":""}\nMAKE EACH SLIDE A DIFFERENT LAYOUT. Return ONLY JSON:\n{"title":"max 7 words","subtitle":"max 12 words","slides":[\n{"layout":"cover","heading":"big title max 8 words","subheading":"context max 12 words"},\n{"layout":"stat","label":"SECTION LABEL","heading":"insight max 8 words","body":"45-55 words","stat":"73%","statLabel":"what this means 5-8 words","takeaway":"lesson max 12 words"},\n{"layout":"tip","label":"SECTION LABEL","heading":"tip title max 8 words","body":"40-50 words","tip":"pro tip 30-40 words","takeaway":"lesson max 12 words"},\n{"layout":"quote","label":"SECTION LABEL","heading":"principle title","quote":"memorable statement max 15 words","body":"expansion 30-40 words","takeaway":"lesson max 12 words"},\n{"layout":"list","label":"SECTION LABEL","heading":"list title max 8 words","items":["item 1 max 8 words","item 2","item 3"],"body":"context 20-25 words","takeaway":"lesson max 12 words"},\n{"layout":"cta","heading":"big takeaway max 10 words","body":"follow message 20-25 words"}\n]}`;
}

function imgPromptGen(topic,tone){
  const s={story:"cinematic portrait, warm golden hour, film grain, 35mm, shallow depth of field",insight:"abstract conceptual art, dramatic lighting, editorial style, dark background",list:"clean flat lay, soft diffused light, neutral minimal, organized composition",question:"split dual composition, contrasting worlds, dramatic lighting",data:"futuristic data visualization, neon nodes, dark navy, electric blue glow",mistake:"chiaroscuro lighting, one silhouette turning, moody cinematic, hope and regret"}[tone]||"cinematic minimal";
  return topic+": "+s+", no text overlay, no watermark, ultra HD 4K, 16:9, professional LinkedIn cover";
}

function schedulePrompt(topic,domain){
  return `LinkedIn algorithm best posting times for topic: "${topic}" in ${domain||"general"} niche.\nReturn ONLY JSON:\n{"best_time":"Day at HH:MM AM/PM","why":"1 sentence reason","slots":[{"day":"Monday","time":"8:00 AM","score":95,"reason":"reason"},{"day":"Wednesday","time":"12:00 PM","score":88,"reason":"reason"},{"day":"Thursday","time":"9:00 AM","score":82,"reason":"reason"}],"avoid":"when NOT to post 1 sentence"}`;
}

/* ── PPT BUILDER ── */
async function buildPPT(slides,title,themeId){
  const Lib=window.PptxGenJS;
  if(!Lib)throw new Error("PPT library not loaded");
  const p=new Lib();p.layout="LAYOUT_16x9";p.title=title;
  const ST=p.ShapeType;
  const C=(PPT_THEMES.find(t=>t.id===themeId)||PPT_THEMES[0]).colors;
  const isDark=C.dark;
  const r=(sl,x,y,w,h,col,op)=>{const f=op!=null?{color:col,transparency:op}:{color:col};sl.addShape(ST.rect,{x,y,w,h,fill:f,line:{color:col,width:0}});};
  const rr=(sl,x,y,w,h,col,rad,op)=>{const f=op!=null?{color:col,transparency:op}:{color:col};sl.addShape(ST.roundRect,{x,y,w,h,fill:f,line:{color:col,width:0},rectRadius:rad||0.18});};
  const el=(sl,x,y,w,h,col,op)=>{const f=op!=null?{color:col,transparency:op}:{color:col};sl.addShape(ST.ellipse,{x,y,w,h,fill:f,line:{color:col,width:0}});};
  const tx=(sl,text,x,y,w,h,o)=>sl.addText(text||"",{x,y,w,h,...(o||{})});

  for(let i=0;i<slides.length;i++){
    const s=slides[i];const sl=p.addSlide();
    const lay=s.layout||(i===0?"cover":i===slides.length-1?"cta":"stat");

    if(lay==="cover"){
      sl.background={color:C.bg};
      if(isDark){
        el(sl,5.5,-2,7,7,C.brand,82);el(sl,7.5,3.5,4,4,C.accent,88);el(sl,-2,3,4,4,C.accent,91);
        r(sl,0,0,0.08,5.625,C.accent);
        rr(sl,0.42,0.28,2.0,0.36,C.brand);tx(sl,"⚡ PostFlow AI",0.42,0.28,2.0,0.36,{fontSize:9,color:"FFFFFF",bold:true,align:"center",valign:"middle"});
        tx(sl,s.heading||title,0.42,1.0,7.4,2.4,{fontSize:36,color:C.text,bold:true,fontFace:"Calibri",align:"left",lineSpacingMultiple:1.08});
        r(sl,0.42,3.55,2.8,0.06,C.accent);
        tx(sl,s.subheading||"",0.42,3.75,7.4,0.8,{fontSize:15,color:C.sub,align:"left"});
        rr(sl,9.05,0.28,0.68,0.3,C.brand);tx(sl,"1/"+slides.length,9.05,0.28,0.68,0.3,{fontSize:8,color:"FFFFFF",align:"center",valign:"middle"});
        r(sl,0,5.22,10,0.4,"020508");tx(sl,"PostFlow AI  ·  "+slides.length+" slides",0.42,5.22,9,0.4,{fontSize:8.5,color:"475569",align:"left",valign:"middle"});
      }else{
        sl.background={color:"FFFFFF"};
        r(sl,0,0,4.8,5.625,C.brand);el(sl,0.5,3,5,5,C.accent,88);el(sl,-1.5,-1,3.5,3.5,"FFFFFF",88);
        tx(sl,"⚡ PostFlow AI",0.38,0.3,4.2,0.36,{fontSize:10,color:"FFFFFF",bold:true,align:"left"});
        tx(sl,s.heading||title,0.38,1.0,4.2,2.6,{fontSize:31,color:"FFFFFF",bold:true,fontFace:"Calibri",align:"left",lineSpacingMultiple:1.1});
        r(sl,0.38,3.72,2.0,0.07,"FFFFFF");
        tx(sl,s.subheading||"",0.38,3.92,4.1,0.7,{fontSize:13,color:"DBEAFE",align:"left"});
        tx(sl,"PostFlow AI  ·  "+slides.length+" slides",0.38,5.22,4,0.3,{fontSize:8.5,color:"BFDBFE",align:"left",valign:"middle"});
        el(sl,5.2,0.3,4.5,4.5,C.accent,90);el(sl,6,1.5,2.8,2.8,C.brand,85);
        tx(sl,(slides.length-2)+"\nInsights",5.0,1.2,5.0,2.5,{fontSize:52,color:C.brand,bold:true,align:"center",lineSpacingMultiple:.95});
      }
    }
    else if(lay==="stat"){
      sl.background={color:isDark?"0B111D":"F8FAFC"};
      r(sl,0,0,10,0.07,C.accent);
      rr(sl,9.05,0.14,0.65,0.28,C.brand);tx(sl,i+"/"+(slides.length-2),9.05,0.14,0.65,0.28,{fontSize:8,color:"FFFFFF",bold:true,align:"center",valign:"middle"});
      tx(sl,(s.label||"INSIGHT").toUpperCase(),0.42,0.2,7,0.28,{fontSize:9.5,color:C.accent,bold:true,charSpacing:1.8,align:"left"});

      r(sl,0.42,1.48,1.8,0.07,C.accent);
      tx(sl,s.body||"",0.42,1.68,5.55,2.5,{fontSize:12.5,color:isDark?"94A3B8":"334155",align:"left",valign:"top",lineSpacingMultiple:1.55});
      rr(sl,6.45,1.0,3.2,4.0,C.brand,0.2);el(sl,6.7,1.1,2.8,2.8,C.accent,90);
      tx(sl,"📊",6.45,1.3,3.2,0.7,{fontSize:28,align:"center"});
      tx(sl,s.stat||"",6.45,2.05,3.2,1.0,{fontSize:44,color:C.stat,bold:true,align:"center"});

      tx(sl,"PostFlow AI",0.42,5.3,3,0.2,{fontSize:7.5,color:"64748B",align:"left"});
    }
    else if(lay==="tip"){

      rr(sl,9.05,0.14,0.65,0.28,C.accent);tx(sl,i+"/"+(slides.length-2),9.05,0.14,0.65,0.28,{fontSize:8,color:isDark?"111827":"FFFFFF",bold:true,align:"center",valign:"middle"});
      tx(sl,(s.label||"PRO TIP").toUpperCase(),0.42,0.2,7,0.28,{fontSize:9.5,color:C.brand,bold:true,charSpacing:1.8,align:"left"});
      tx(sl,s.heading||"",0.42,0.52,9.1,0.88,{fontSize:23,color:isDark?"FFFFFF":"0F172A",bold:true,fontFace:"Calibri",lineSpacingMultiple:1.08,align:"left"});
      r(sl,0.42,1.48,1.8,0.07,C.brand);
      tx(sl,s.body||"",0.42,1.68,5.55,2.2,{fontSize:12.5,color:isDark?"8BA3BC":"334155",align:"left",valign:"top",lineSpacingMultiple:1.55});
      rr(sl,6.45,1.0,3.2,4.0,isDark?"0F172A":"EFF6FF",0.2);rr(sl,6.45,1.0,3.2,0.72,C.brand,0.2);
      tx(sl,"💡  Pro Tip",6.45,1.0,3.2,0.72,{fontSize:12,color:"FFFFFF",bold:true,align:"center",valign:"middle"});
      tx(sl,s.tip||"",6.55,1.85,3.0,2.9,{fontSize:11.5,color:isDark?"C4CFD8":"1E3A5F",align:"left",valign:"top",lineSpacingMultiple:1.5});
      if(s.takeaway){rr(sl,0.42,4.68,5.55,0.56,isDark?"0F172A":"F0FDF4",0.1);tx(sl,"✓ "+s.takeaway,0.55,4.68,5.32,0.56,{fontSize:11,color:C.brand,bold:true,align:"left",valign:"middle"});}
      tx(sl,"PostFlow AI",0.42,5.3,3,0.2,{fontSize:7.5,color:"64748B",align:"left"});
    }
    else if(lay==="quote"){
      sl.background={color:isDark?"080D18":"F0F9FF"};
      r(sl,0,0,10,0.07,C.accent);
      rr(sl,9.05,0.14,0.65,0.28,C.brand);tx(sl,i+"/"+(slides.length-2),9.05,0.14,0.65,0.28,{fontSize:8,color:"FFFFFF",bold:true,align:"center",valign:"middle"});
      tx(sl,(s.label||"PRINCIPLE").toUpperCase(),0.42,0.2,9.1,0.28,{fontSize:9.5,color:C.accent,bold:true,charSpacing:1.8,align:"left"});
      tx(sl,"\u201C",0.15,0.45,1.5,2.0,{fontSize:130,color:C.accent,align:"left",valign:"top",bold:true});
      tx(sl,s.quote||s.heading||"",1.8,1.05,7.8,1.9,{fontSize:24,color:isDark?"FFFFFF":"0C2340",bold:true,fontFace:"Calibri",align:"left",lineSpacingMultiple:1.15});
      tx(sl,"\u201D",8.4,1.8,1.5,1.5,{fontSize:130,color:C.accent,align:"right",valign:"top",bold:true});
      r(sl,0.42,3.22,9.1,0.06,isDark?"1E293B":"CBD5E1");
      tx(sl,s.body||"",0.42,3.42,9.1,1.4,{fontSize:12.5,color:isDark?"8BA3BC":"334155",align:"left",lineSpacingMultiple:1.55});
      if(s.takeaway){rr(sl,0.42,4.68,9.1,0.56,isDark?"0F172A":"FFF7ED",0.1);tx(sl,"→ "+s.takeaway,0.55,4.68,8.8,0.56,{fontSize:11,color:C.stat,bold:true,align:"left",valign:"middle"});}
      tx(sl,"PostFlow AI",0.42,5.3,3,0.2,{fontSize:7.5,color:"64748B",align:"left"});
    }
    else if(lay==="list"){
      sl.background={color:isDark?"0A1020":"FAFAFE"};
      r(sl,0,0,10,0.07,C.brand);
      rr(sl,9.05,0.14,0.65,0.28,C.accent);tx(sl,i+"/"+(slides.length-2),9.05,0.14,0.65,0.28,{fontSize:8,color:isDark?"111827":"FFFFFF",bold:true,align:"center",valign:"middle"});
      tx(sl,(s.label||"KEY STEPS").toUpperCase(),0.42,0.2,7,0.28,{fontSize:9.5,color:C.brand,bold:true,charSpacing:1.8,align:"left"});

      r(sl,0.42,1.48,1.8,0.07,C.brand);
      const items=s.items||[s.body||""];const cols=[C.brand,C.accent,C.stat];
      items.slice(0,4).forEach((item,ii)=>{
        const y=1.75+ii*0.88;

        rr(sl,1.06,y,8.5,0.52,isDark?"0F1A2E":"F0F7FF",0.08);tx(sl,item,1.2,y,8.2,0.52,{fontSize:13,color:isDark?"D1D5DB":"1E3A5F",align:"left",valign:"middle"});
      });
      if(s.takeaway){rr(sl,0.42,4.68,9.1,0.56,isDark?"0F172A":"FFF7ED",0.1);tx(sl,"★ "+s.takeaway,0.55,4.68,8.8,0.56,{fontSize:11,color:C.stat,bold:true,align:"left",valign:"middle"});}
      tx(sl,"PostFlow AI",0.42,5.3,3,0.2,{fontSize:7.5,color:"64748B",align:"left"});
    }
    else if(lay==="cta"){
      sl.background={color:C.bg};
      if(isDark){
        el(sl,4.5,-2,7,7,C.brand,85);el(sl,-2,2.5,5.5,5.5,C.accent,91);
        r(sl,0,0,0.08,5.625,C.accent);
        rr(sl,0.42,0.35,2.4,0.34,C.accent);tx(sl,"KEY TAKEAWAY",0.42,0.35,2.4,0.34,{fontSize:8.5,color:C.bg,bold:true,align:"center",valign:"middle"});
        tx(sl,s.heading||"Take Action Today",0.42,0.88,8.6,2.0,{fontSize:31,color:C.text,bold:true,fontFace:"Calibri",align:"left",lineSpacingMultiple:1.1});
        r(sl,0.42,3.0,2.8,0.07,C.accent);
        tx(sl,s.body||"",0.42,3.2,7.5,1.3,{fontSize:13,color:C.sub,align:"left",lineSpacingMultiple:1.5});
        rr(sl,0.42,4.6,3.8,0.64,C.accent,0.14);tx(sl,"Follow for more insights →",0.42,4.6,3.8,0.64,{fontSize:13,color:C.bg,bold:true,align:"center",valign:"middle"});

        <p style={{margin:"0 0 14px",color:"#64748B",fontSize:13}}>This changes the entire structure, prompt strategy, and writing style — not just tone.</p>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:9}}>
          {POST_TONES.map(t=><div key={t.id} className="tc" onClick={()=>setTone(t.id)} style={{border:"1.5px solid "+(tone===t.id?"#2563EB":"#E2E8F0"),background:tone===t.id?"#EFF6FF":"#FAFCFF"}}><div style={{fontSize:18,marginBottom:3}}>{t.label.split(" ")[0]}</div><div style={{fontWeight:600,fontSize:12,color:tone===t.id?"#2563EB":"#0F172A"}}>{t.label.slice(t.label.indexOf(" ")+1)}</div><div style={{fontSize:11,color:"#94A3B8",marginTop:2}}>{t.desc}</div></div>)}
        </div>
      </div>

      {/* TOPIC GENERATOR */}
      <div style={cd}>
        <h2 style={{margin:"0 0 4px",fontSize:17,color:"#0F172A",fontFamily:"'Syne',sans-serif",fontWeight:700}}>🎯 Topic Generator</h2>
        <p style={{margin:"0 0 14px",color:"#64748B",fontSize:13}}>Pick a niche for 6 AI-researched ideas — each with a unique angle, hook, and engagement prediction</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
          <div><label style={{fontSize:11,fontWeight:700,color:"#64748B",display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:.5}}>Domain</label><select className="if" value={domain} onChange={e=>{setDomain(e.target.value);setTopics([]);setPicked(null);}} style={{...inp,cursor:"pointer"}}><option value="">— Choose niche —</option>{DOMAINS.map(d=><option key={d} value={d}>{d}</option>)}</select></div>
          <div><label style={{fontSize:11,fontWeight:700,color:"#64748B",display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:.5}}>Custom Topic</label><input className="if" type="text" placeholder="e.g. My startup failed. Here's why." value={custom} onChange={e=>setCustom(e.target.value)} onKeyDown={e=>e.key==="Enter"&&useOwn()} style={inp}/></div>
        </div>
        <div style={{display:"flex",gap:9,flexWrap:"wrap"}}>
          <button style={{...bP,opacity:(!domain&&!custom.trim())||busy.topics?0.5:1}} onClick={getTopics} disabled={busy.topics||(!domain&&!custom.trim())}>{busy.topics?<><Spin/>Finding ideas...</>:"🔥 Generate Topic Ideas"}</button>
          {custom.trim()&&<button style={bO} onClick={useOwn}>✍️ Use This Directly</button>}
        </div>
        {msgs.topics&&<Msg type="error">{msgs.topics}</Msg>}
      </div>

      {/* TOPIC LIST */}
      {step>=2&&topics.length>0&&<div style={cd}>
        <h2 style={{margin:"0 0 4px",fontSize:17,color:"#0F172A",fontFamily:"'Syne',sans-serif",fontWeight:700}}>🔥 AI Topic Ideas</h2>
        <p style={{margin:"0 0 14px",color:"#64748B",fontSize:13}}>Each has a unique angle, hook, and predicted engagement type</p>
        {topics.map((t,i)=><div key={i} onClick={()=>pickTopic(t)} style={{border:"1.5px solid "+(picked===t?"#2563EB":"#E2E8F0"),borderRadius:14,padding:"13px 16px",cursor:"pointer",background:picked===t?"#EFF6FF":"#FAFCFF",marginBottom:10,transition:"all .2s"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
            <div style={{fontWeight:600,color:"#0F172A",fontSize:14,flex:1}}>{t.emoji} {t.title}</div>
            <div style={{display:"flex",gap:6,flexShrink:0}}>
              {t.estimated_reach&&<Badge color={t.estimated_reach==="viral"?"#EF4444":t.estimated_reach==="high"?"#F59E0B":"#10B981"}>{t.estimated_reach==="viral"?"🚀 viral":t.estimated_reach==="high"?"🔥 high":"📈 "+t.estimated_reach}</Badge>}
              {picked===t&&<span style={{color:"#2563EB",fontSize:16}}>✓</span>}
            </div>
          </div>
          <div style={{fontSize:12,color:"#1D4ED8",marginTop:6,fontWeight:500,background:"#EFF6FF",padding:"5px 10px",borderRadius:8,display:"inline-block"}}>"{t.hook}"</div>
          <div style={{display:"flex",gap:10,marginTop:8,flexWrap:"wrap"}}>
            <span style={{fontSize:12,color:"#64748B"}}>📈 {t.why}</span>
            {t.angle&&<span style={{fontSize:12,color:"#7C3AED"}}>🎯 {t.angle}</span>}
          </div>
        </div>)}
        {picked&&<button style={{...bP,marginTop:8,opacity:busy.post?0.5:1}} onClick={()=>draft(false)} disabled={busy.post}>{busy.post?<><Spin/>Drafting post...</>:"✍️ Draft This Post →"}</button>}
        {msgs.post&&<Msg type="error">{msgs.post}</Msg>}
      </div>}

      {step>=2&&picked&&topics.length===0&&!post&&<div style={cd}>
        <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
          <div style={{flex:1}}><div style={{fontWeight:600,fontSize:15}}>{picked.emoji} {picked.title}</div><div style={{fontSize:13,color:"#64748B",marginTop:3}}>Format: <strong style={{color:"#7C3AED"}}>{POST_TONES.find(t=>t.id===tone)?.label}</strong></div></div>
          <button style={{...bP,opacity:busy.post?0.5:1}} onClick={()=>draft(false)} disabled={busy.post}>{busy.post?<><Spin/>Drafting...</>:"✍️ Draft My Post →"}</button>
        </div>
        {msgs.post&&<Msg type="error">{msgs.post}</Msg>}
      </div>}

      {/* STEP 3 TABS */}
      {step>=3&&<>
        <div style={{background:"#fff",borderRadius:20,padding:"14px 16px",marginBottom:16,boxShadow:"0 2px 16px rgba(0,0,0,.06)"}}>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {[{id:"post",label:"✍️ Post"},{id:"ppt",label:"📊 PPT Carousel"},{id:"image",label:"🎨 AI Image"},{id:"schedule",label:"📅 Schedule"}].map(t=><button key={t.id} className={"tb "+(tab===t.id?"ta":"ti")} onClick={()=>setTab(t.id)}>{t.label}</button>)}
          </div>
        </div>

        {/* POST */}
        {tab==="post"&&<div style={cd}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14,flexWrap:"wrap",gap:8}}>
            <div><h2 style={{margin:"0 0 4px",fontSize:17,color:"#0F172A",fontFamily:"'Syne',sans-serif",fontWeight:700}}>✍️ Your LinkedIn Post</h2><p style={{margin:0,fontSize:13,color:"#64748B"}}>Format: <strong style={{color:"#7C3AED"}}>{POST_TONES.find(t=>t.id===tone)?.label}</strong> · Edit freely</p></div>
            <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
              <button style={bO} onClick={copyPost}>{copied?"✅ Copied!":"📋 Copy + Tags"}</button>
              <a href="https://www.linkedin.com/feed/" target="_blank" rel="noopener noreferrer" style={{textDecoration:"none"}}><button style={bP}>Open LinkedIn →</button></a>
            </div>
          </div>
          <textarea value={post} onChange={e=>setPost(e.target.value)} className="if" style={{...ta,minHeight:240}}/>
          {htags&&<div style={{marginTop:10,padding:"10px 14px",background:"#EFF6FF",borderRadius:12,fontSize:13,color:"#1D4ED8",fontWeight:500}}>{htags}</div>}
          <div style={{marginTop:8,fontSize:12,color:"#94A3B8",display:"flex",gap:16}}>
            <span>{post.split(/\s+/).filter(Boolean).length} words</span>
            <span style={{color:post.split(/\s+/).filter(Boolean).length>230?"#EF4444":"#10B981"}}>{post.split(/\s+/).filter(Boolean).length>230?"⚠️ Too long":"✓ Good length"}</span>
          </div>
          <div style={{marginTop:20,borderTop:"1px solid #F1F5F9",paddingTop:18}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div><div style={{fontWeight:600,fontSize:14,color:"#0F172A"}}>🤖 Ask AI to Change Anything</div><div style={{fontSize:12,color:"#64748B",marginTop:2}}>Describe exactly what you want different</div></div>
              <button onClick={()=>setShowChange(p=>!p)} style={{...bO,padding:"6px 14px",fontSize:12}}>{showChange?"▲ Hide":"✏️ Request Change"}</button>
            </div>
            {showChange&&<div><textarea value={change} onChange={e=>setChange(e.target.value)} className="if" placeholder={"• Make the hook punchier\n• Add a personal story\n• Insert a stat about X\n• Shorten by 50 words\n• Make it more casual"} style={{...ta,minHeight:80,background:"#FAFCFF",border:"1.5px solid #BFDBFE"}}/><div style={{display:"flex",gap:9,marginTop:10}}><button style={{...bA,opacity:(!change.trim()||busy.post)?0.5:1}} onClick={()=>draft(true)} disabled={!change.trim()||busy.post}>{busy.post?<><Spin/>Rewriting...</>:"✨ Apply Change"}</button><button style={{...bO,padding:"10px 16px"}} onClick={()=>{setShowChange(false);setChange("");}}>Cancel</button></div></div>}
          </div>
          <div style={{marginTop:16,borderTop:"1px solid #F1F5F9",paddingTop:14}}>
            <div style={{fontWeight:600,fontSize:12,color:"#94A3B8",marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>Quick improvements:</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {["Make hook stronger","Add vulnerability","Insert a stat","Punch up the CTA","Shorten by 30%","More casual voice"].map(s=><button key={s} onClick={()=>{setChange(s);setShowChange(true);}} style={{...bb,background:"#F1F5F9",color:"#334155",border:"1px solid #E2E8F0",padding:"6px 13px",fontSize:12}}>{s}</button>)}
            </div>
          </div>
        </div>}

        {/* PPT */}
        {tab==="ppt"&&<div style={cd}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16,flexWrap:"wrap",gap:10}}>
            <div><h2 style={{margin:"0 0 4px",fontSize:17,color:"#0F172A",fontFamily:"'Syne',sans-serif",fontWeight:700}}>📊 AI Carousel PPT</h2><p style={{margin:0,fontSize:13,color:"#64748B"}}>6 slides · 5 different layouts · AI-written · 6 themes</p></div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{!pptBlob?<button style={{...bO,opacity:busy.ppt?0.5:1}} onClick={genPPT} disabled={busy.ppt}>{busy.ppt?<><Spin color="#2563EB"/>Building...</>:"⚡ Generate Carousel"}</button>:<><button style={{...bO,opacity:busy.ppt?0.5:1}} onClick={genPPT} disabled={busy.ppt}>↺ Regenerate</button><button style={bG} onClick={dlPPT}>⬇ Download .pptx</button></>}</div>
          </div>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:700,color:"#64748B",marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>🎨 Theme:</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
              {PPT_THEMES.map(th=><div key={th.id} className="tc" onClick={()=>setPptTheme(th.id)} style={{border:"2px solid "+(pptTheme===th.id?"#2563EB":"#E2E8F0"),background:pptTheme===th.id?"#EFF6FF":"#FAFCFF"}}><div style={{fontSize:16,marginBottom:2}}>{th.label.split(" ")[0]}</div><div style={{fontWeight:600,fontSize:12,color:pptTheme===th.id?"#2563EB":"#0F172A"}}>{th.label.slice(th.label.indexOf(" ")+1)}</div></div>)}
            </div>
            <p style={{margin:"10px 0 0",fontSize:12,color:"#94A3B8"}}>Each PPT has 5 different slide layouts (stat, tip, quote, list, CTA) — not the same template repeated</p>
          </div>
          {msgs.ppt&&<Msg type={msgs.ppt.startsWith("✅")?"success":msgs.ppt.startsWith("❌")?"error":"warn"}>{msgs.ppt}</Msg>}
          {pptSlides&&<div style={{marginTop:14,display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(148px,1fr))",gap:10}}>
            {pptSlides.map((s,i)=>{const C=(PPT_THEMES.find(x=>x.id===pptTheme)||PPT_THEMES[0]).colors;const isT=i===0,isL=i===pptSlides.length-1;const li={cover:"📌",stat:"📊",tip:"💡",quote:"💬",list:"📋",cta:"🎯"}[s.layout]||"📊";return <div key={i} style={{border:"1px solid #E2E8F0",borderRadius:12,overflow:"hidden",background:isT||isL?"#"+C.bg:"#fff"}}><div style={{background:"#"+C.accent,height:4}}/><div style={{padding:"10px 12px"}}><div style={{fontSize:9,color:isT||isL?"#"+C.accent:"#"+C.brand,fontWeight:800,marginBottom:4,textTransform:"uppercase"}}>{li} {s.layout?.toUpperCase()}</div><div style={{fontWeight:700,fontSize:11,color:isT||isL?"#F0F4FF":"#0F172A",lineHeight:1.3,marginBottom:4}}>{s.heading}</div><div style={{fontSize:10,color:"#94A3B8"}}>{(s.body||s.quote||"").slice(0,55)}{(s.body||s.quote||"").length>55?"…":""}</div>{s.stat&&<div style={{marginTop:5,fontSize:14,fontWeight:900,color:"#"+C.stat}}>{s.stat}</div>}</div></div>;})}</div>}
        </div>}

        {/* IMAGE */}
        {tab==="image"&&<div style={cd}>
          <h2 style={{margin:"0 0 4px",fontSize:17,color:"#0F172A",fontFamily:"'Syne',sans-serif",fontWeight:700}}>🎨 AI Cover Image</h2>
          <p style={{margin:"0 0 16px",fontSize:13,color:"#64748B"}}>100% AI generated — Gemini AI or Pollinations FLUX. Zero stock photos. Always a fresh image.</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
            {[{id:"pollinations",label:"🌸 Pollinations FLUX",sub:"Free · No key · Always AI · ~20s"},{id:"gemini",label:"🤖 Gemini AI",sub:"Uses your key · Higher quality · ~15s"}].map(m=><div key={m.id} onClick={()=>setImgMode(m.id)} style={{padding:"12px 15px",border:"2px solid "+(imgMode===m.id?"#2563EB":"#E2E8F0"),borderRadius:14,cursor:"pointer",background:imgMode===m.id?"#EFF6FF":"#FAFCFF",transition:"all .2s"}}><div style={{fontWeight:600,fontSize:13,color:imgMode===m.id?"#2563EB":"#0F172A"}}>{m.label}</div><div style={{fontSize:11,color:"#64748B",marginTop:3}}>{m.sub}</div></div>)}
          </div>
          <div style={{marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <label style={{fontSize:11,fontWeight:700,color:"#64748B",textTransform:"uppercase",letterSpacing:.5}}>Image Prompt</label>
              <button style={{...bO,fontSize:11,padding:"5px 12px",opacity:busy.imgP?0.5:1}} onClick={autoImgPrompt} disabled={busy.imgP}>{busy.imgP?<><Spin color="#2563EB"/>Writing...</>:"✨ AI Auto-Write"}</button>
            </div>
            <textarea value={imgPrompt} onChange={e=>setImgPrompt(e.target.value)} className="if" placeholder="e.g. 'Moody dark office, laptop glowing blue, 35mm film, shallow depth of field, no text, cinematic'" style={{...ta,minHeight:80,background:"#FAFCFF",border:"1.5px solid #BFDBFE"}}/>
            <p style={{margin:"6px 0 0",fontSize:11,color:"#94A3B8"}}>💡 More detail = better result. Mention: lighting, mood, colors, style</p>
          </div>
          <button style={{...bV,fontSize:14,padding:"12px 28px",opacity:!imgPrompt.trim()||busy.img?0.5:1}} onClick={genImg} disabled={!imgPrompt.trim()||busy.img}>{busy.img?<><Spin/>Generating...</>:"🎨 Generate AI Image"}</button>
          {msgs.img&&<Msg type={msgs.img.startsWith("✅")?"success":msgs.img.startsWith("❌")?"error":"warn"}>{msgs.img}</Msg>}
          {imgSrc&&<div style={{marginTop:18}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:8}}>
              <span style={{fontSize:12,color:"#64748B"}}>By: <strong style={{color:"#2563EB"}}>{imgService}</strong></span>
              <div style={{display:"flex",gap:8}}>
                <button style={{...bO,fontSize:12,padding:"6px 14px",opacity:busy.img?0.5:1}} onClick={genImg} disabled={busy.img}>🔄 Regenerate</button>
                <button style={{...bG,fontSize:12,padding:"6px 14px"}} onClick={()=>{if(imgSrc.startsWith("data:")){const a=document.createElement("a");a.href=imgSrc;a.download="cover.png";a.click();}else window.open(imgSrc,"_blank");}}>⬇ Save</button>
              </div>
            </div>
            <img src={imgSrc} alt="AI cover" style={{width:"100%",borderRadius:16,border:"1px solid #E2E8F0",display:"block",boxShadow:"0 4px 24px rgba(0,0,0,.08)"}}/>
            <p style={{margin:"10px 0 0",fontSize:11,color:"#94A3B8"}}>💡 Attach to your LinkedIn post for 2-3x more impressions</p>
          </div>}
        </div>}

        {/* SCHEDULE */}
        {tab==="schedule"&&<div style={cd}>
          <h2 style={{margin:"0 0 4px",fontSize:17,color:"#0F172A",fontFamily:"'Syne',sans-serif",fontWeight:700}}>📅 Smart Post Scheduler</h2>
          <p style={{margin:"0 0 16px",fontSize:13,color:"#64748B"}}>AI analyzes your topic and recommends the best posting time for maximum LinkedIn reach</p>
          <button style={{...bP,marginBottom:16,opacity:busy.sched?0.5:1}} onClick={getSched} disabled={busy.sched}>{busy.sched?<><Spin/>Calculating best times...</>:"🔍 Find Best Posting Time"}</button>
          {msgs.sched&&<Msg type={msgs.sched.startsWith("✅")?"success":msgs.sched.startsWith("❌")?"error":"warn"}>{msgs.sched}</Msg>}
          {schedule&&<div style={{animation:"up .3s ease"}}>
            <div style={{background:"linear-gradient(135deg,#EFF6FF,#F0FDF4)",borderRadius:16,padding:20,marginBottom:16,border:"1px solid #BFDBFE"}}>
              <div style={{fontSize:11,fontWeight:700,color:"#64748B",textTransform:"uppercase",letterSpacing:.5,marginBottom:4}}>🏆 Best Time</div>
              <div style={{fontSize:26,fontWeight:800,color:"#0F172A",fontFamily:"'Syne',sans-serif"}}>{schedule.best_time}</div>
              <div style={{fontSize:13,color:"#2563EB",marginTop:6}}>{schedule.why}</div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
              {(schedule.slots||[]).map((slot,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",background:i===0?"#EFF6FF":"#F8FAFC",borderRadius:12,border:"1px solid "+(i===0?"#BFDBFE":"#E2E8F0")}}>
                <div style={{width:44,height:44,borderRadius:12,background:i===0?"#2563EB":"#E2E8F0",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><span style={{fontSize:13,fontWeight:800,color:i===0?"#fff":"#64748B"}}>{slot.score}%</span></div>
                <div style={{flex:1}}><div style={{fontWeight:600,fontSize:14,color:"#0F172A"}}>{slot.day} at {slot.time}</div><div style={{fontSize:12,color:"#64748B",marginTop:2}}>{slot.reason}</div></div>
                {i===0&&<Badge color="#10B981">Best</Badge>}
              </div>)}
            </div>
            {schedule.avoid&&<Msg type="warn">⚠️ Avoid: {schedule.avoid}</Msg>}
          </div>}
          <div style={{borderTop:"1px solid #F1F5F9",paddingTop:16,marginTop:16}}>
            <div style={{fontWeight:600,fontSize:14,color:"#0F172A",marginBottom:10}}>📌 Set Manual Reminder</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              <div><label style={{fontSize:11,fontWeight:700,color:"#64748B",display:"block",marginBottom:5,textTransform:"uppercase"}}>Day</label><select className="if" value={schedDay} onChange={e=>setSchedDay(e.target.value)} style={{...inp,cursor:"pointer"}}>{BEST_DAYS.map(d=><option key={d} value={d}>{d}</option>)}</select></div>
              <div><label style={{fontSize:11,fontWeight:700,color:"#64748B",display:"block",marginBottom:5,textTransform:"uppercase"}}>Time</label><select className="if" value={schedTime} onChange={e=>setSchedTime(e.target.value)} style={{...inp,cursor:"pointer"}}>{SCHED_TIMES.map(t=><option key={t} value={t}>{t}</option>)}</select></div>
            </div>
            <div style={{background:"#F0FDF4",borderRadius:12,padding:"14px 16px",border:"1px solid #BBF7D0"}}>
              <div style={{fontWeight:600,fontSize:14,color:"#15803D",marginBottom:4}}>✅ Reminder set: {schedDay} at {schedTime}</div>
              <div style={{fontSize:12,color:"#64748B"}}>Post is drafted and ready. Come back on {schedDay}, copy it, paste to LinkedIn.</div>
              <a href="https://www.linkedin.com/feed/" target="_blank" rel="noopener noreferrer" style={{textDecoration:"none"}}><button style={{...bG,marginTop:10,fontSize:12,padding:"8px 18px"}}>Open LinkedIn Now →</button></a>
            </div>
          </div>
        </div>}

        {/* WhatsApp promo */}
        <div style={{...cd,background:"#060E09",border:"1px solid rgba(37,211,102,.2)"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
            <div style={{fontSize:28}}>💬</div>
            <div><div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:15,color:"#A7F3D0"}}>Coming Soon: WhatsApp Bot</div><div style={{fontSize:12,color:"#4B7C5F",marginTop:2}}>Idea → post + PPT → straight to your WhatsApp</div></div>
            <span style={{marginLeft:"auto",background:"rgba(37,211,102,.15)",color:"#25D366",fontSize:11,fontWeight:700,padding:"4px 12px",borderRadius:20,border:"1px solid rgba(37,211,102,.2)"}}>Beta Soon</span>
          </div>
          <p style={{fontSize:13,color:"#4B7C5F",lineHeight:1.6,marginBottom:14}}>Register on our site → get a dedicated WhatsApp number → whenever inspiration strikes, just text your idea → receive a polished post + PPT download link directly in WhatsApp chat.</p>
          <button style={bW} onClick={()=>alert("WhatsApp beta coming soon! Follow PostFlow AI on LinkedIn for updates.")}>💬 Join WhatsApp Beta Waitlist</button>
        </div>

        <div style={{textAlign:"center",marginTop:4,marginBottom:20}}><button style={bO} onClick={reset}>🔄 Start a New Post</button></div>
      </>}

    </div>
  </div>;
}

function App(){const [v,setV]=useState("landing");return v==="landing"?<Landing onLaunch={()=>setV("tool")}/>:<Tool onHome={()=>setV("landing")}/>;}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
