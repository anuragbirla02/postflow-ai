/* ══ GEMINI TEXT ══ */
async function aiText(prompt, key) {
  if (!key) throw new Error("Please save your Gemini API key first.");
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`,
    { method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ contents:[{ parts:[{ text:prompt }] }] }) }
  );
  const d = await res.json();
  if (d.error) throw new Error(d.error.message);
  return d.candidates?.[0]?.content?.parts?.[0]?.text || "";
}

/* ══ IMAGES: Pexels (with key) or Picsum (no key, always works) ══ */
async function searchImages(query, pexelsKey) {
  if (pexelsKey && pexelsKey.trim().length > 10) {
    // Pexels API - free key, proper search
    try {
      const res = await fetch(
        `https://api.pexels.com/v1/search?query=${encodeURIComponent(query)}&per_page=9&orientation=landscape`,
        { headers:{ Authorization: pexelsKey.trim() } }
      );
      const d = await res.json();
      if (d.error) throw new Error(d.error);
      return (d.photos||[]).map(p=>({
        thumb: p.src.medium,
        full: p.src.large2x,
        download: p.src.large2x,
        credit: p.photographer,
        creditUrl: p.photographer_url,
        source: "Pexels",
      }));
    } catch(e) { /* fall through to Picsum */ }
  }
  // Picsum Photos — completely free, no key, no auth, professional photos
  const seed = encodeURIComponent(query);
  return Array.from({length:9},(_,i)=>({
    thumb: `https://picsum.photos/seed/${seed}${i}/400/250`,
    full:  `https://picsum.photos/seed/${seed}${i}/1600/900`,
    download: `https://picsum.photos/seed/${seed}${i}/1600/900`,
    credit: "Picsum Photos",
    creditUrl: "https://picsum.photos",
    source: "Picsum",
  }));
}

/* ══ JSON PARSER ══ */
function parseJSON(raw) {
  try { return JSON.parse(raw.replace(/```json|```/g,"").trim()); }
  catch {
    const m = raw.match(/\[[\s\S]*\]|\{[\s\S]*\}/);
    if (m) try { return JSON.parse(m[0]); } catch {}
    return null;
  }
}

/* ══ ADVANCED PPTX BUILDER ══ */
async function buildPPTX(slides, title, topic) {
  const Lib = window.PptxGenJS;
  if (!Lib) throw new Error("PPT library not available. Please refresh and try again.");
  const pres = new Lib();
  pres.layout = "LAYOUT_16x9";
  pres.title = title;

  // Color system
  const C = {
    navy:   "0A1628", darkBlue: "0F172A", brand:  "0A66C2",
    bright: "2563EB", accent:  "38BDF8",  teal:   "0EA5E9",
    white:  "FFFFFF", light:   "EFF6FF",  silver: "F1F5F9",
    muted:  "94A3B8", slate:   "334155",  text:   "1E293B",
    gold:   "F59E0B", green:   "10B981",  purple: "7C3AED",
  };

  slides.forEach((s, i) => {
    const sl = pres.addSlide();
    const isTitle = i === 0;
    const isLast  = i === slides.length - 1;

    // ── TITLE SLIDE (Slide 0) ──
    if (isTitle) {
      // Full dark gradient background
      sl.background = { color: C.navy };
      // Large decorative circles
      sl.addShape(pres.ShapeType.ellipse, { x:-1.2, y:-1.2, w:5, h:5, fill:{color:C.brand,transparency:82}, line:{color:C.brand,width:0} });
      sl.addShape(pres.ShapeType.ellipse, { x:7.5,  y:3.5,  w:4, h:4, fill:{color:C.accent,transparency:85}, line:{color:C.accent,width:0} });
      sl.addShape(pres.ShapeType.ellipse, { x:5.5,  y:-0.8, w:2.5, h:2.5, fill:{color:C.teal,transparency:88}, line:{color:C.teal,width:0} });
      // Top badge
      sl.addShape(pres.ShapeType.roundRect, { x:0.55, y:0.35, w:2.6, h:0.45, fill:{color:C.brand}, rectRadius:0.12, line:{color:C.brand,width:0} });
      sl.addText("⚡ PostFlow AI", { x:0.55, y:0.35, w:2.6, h:0.45, fontSize:11, color:C.white, bold:true, align:"center", valign:"middle" });
      // Main title
      sl.addText(title, { x:0.55, y:1.05, w:7.8, h:2.5, fontSize:34, color:C.white, bold:true, align:"left", valign:"middle",
        shadow:{ type:"outer", color:"000000", blur:6, offset:2, angle:45, opacity:0.4 } });
      // Subtitle line
      sl.addShape(pres.ShapeType.rect, { x:0.55, y:3.7, w:1.6, h:0.055, fill:{color:C.accent}, line:{color:C.accent,width:0} });
      sl.addText(s.body || "A LinkedIn Carousel", { x:0.55, y:3.85, w:7, h:0.55, fontSize:15, color:C.muted, align:"left" });
      // Bottom bar
      sl.addShape(pres.ShapeType.rect, { x:0, y:5.25, w:10, h:0.375, fill:{color:C.brand,transparency:70}, line:{color:C.brand,width:0} });
      sl.addText("Made with PostFlow AI  |  postflow.ai", { x:0.55, y:5.25, w:9, h:0.375, fontSize:9, color:C.muted, align:"left", valign:"middle" });
      sl.addText(`${slides.length - 2} Key Insights`, { x:0.55, y:5.25, w:9, h:0.375, fontSize:9, color:C.muted, align:"right", valign:"middle" });
    }

    // ── CONTENT SLIDES (Slides 1 to n-2) ──
    else if (!isLast) {
      const isEven = i % 2 === 0;

      sl.background = { color: isEven ? C.silver : C.white };

      // Top accent bar (full width, thin)
      sl.addShape(pres.ShapeType.rect, { x:0, y:0, w:10, h:0.08, fill:{color:C.brand}, line:{color:C.brand,width:0} });

      // Slide number pill (top right)
      sl.addShape(pres.ShapeType.roundRect, { x:8.85, y:0.18, w:0.8, h:0.36, fill:{color:C.brand}, rectRadius:0.1, line:{color:C.brand,width:0} });
      sl.addText(`${i} / ${slides.length - 2}`, { x:8.85, y:0.18, w:0.8, h:0.36, fontSize:9, color:C.white, bold:true, align:"center", valign:"middle" });

      // Section label
      sl.addText((s.label || `Insight ${i}`).toUpperCase(), { x:0.45, y:0.22, w:6, h:0.35, fontSize:10, color:C.brand, bold:true, align:"left", charSpacing:1.2 });

      // Main heading
      sl.addText(s.heading || "", { x:0.45, y:0.62, w:9.1, h:1.0, fontSize:24, color:C.darkBlue, bold:true, align:"left",
        shadow:{ type:"outer", color:"000000", blur:3, offset:1, angle:45, opacity:0.15 } });

      // Divider line
      sl.addShape(pres.ShapeType.rect, { x:0.45, y:1.68, w:1.8, h:0.07, fill:{color:C.accent}, line:{color:C.accent,width:0} });

      // Body text (left side)
      sl.addText(s.body || "", { x:0.45, y:1.88, w:5.7, h:2.6, fontSize:13, color:C.slate, align:"left", valign:"top", lineSpacingMultiple:1.4 });

      // Right panel (stat box or tip box)
      if (s.stat) {
        // Stat panel with gradient-like layering
        sl.addShape(pres.ShapeType.roundRect, { x:6.45, y:1.1, w:3.15, h:3.8, fill:{color:C.brand}, rectRadius:0.18, line:{color:C.brand,width:0} });
        sl.addShape(pres.ShapeType.roundRect, { x:6.55, y:1.2,  w:3.05, h:3.6, fill:{color:"0D3B6E",transparency:60}, rectRadius:0.15, line:{color:"0D3B6E",width:0} });
        sl.addShape(pres.ShapeType.ellipse, { x:7.1, y:1.3, w:2, h:2, fill:{color:C.accent,transparency:88}, line:{color:C.accent,width:0} });
        sl.addText("📊", { x:6.55, y:1.35, w:3, h:0.55, fontSize:22, align:"center", valign:"middle" });
        sl.addText(s.stat, { x:6.55, y:1.95, w:3, h:1.1, fontSize:36, color:C.white, bold:true, align:"center" });
        sl.addShape(pres.ShapeType.rect, { x:7.2, y:3.1, w:1.6, h:0.055, fill:{color:C.accent,transparency:40}, line:{color:C.accent,width:0} });
        sl.addText(s.statLabel || "", { x:6.55, y:3.25, w:3, h:0.9, fontSize:11, color:"BBD4F0", align:"center", lineSpacingMultiple:1.35 });
      } else {
        // Tip panel
        sl.addShape(pres.ShapeType.roundRect, { x:6.45, y:1.1, w:3.15, h:3.8, fill:{color:C.light}, rectRadius:0.18, line:{color:"BFDBFE",width:1} });
        sl.addShape(pres.ShapeType.roundRect, { x:6.45, y:1.1, w:3.15, h:0.7, fill:{color:C.brand}, rectRadius:0.18, line:{color:C.brand,width:0} });
        sl.addShape(pres.ShapeType.rect, { x:6.45, y:1.6, w:3.15, h:0.2, fill:{color:C.brand}, line:{color:C.brand,width:0} });
        sl.addText("💡  Pro Tip", { x:6.55, y:1.1, w:3, h:0.7, fontSize:12, color:C.white, bold:true, align:"center", valign:"middle" });
        sl.addText(s.tip || (s.body||"").slice(0,130), { x:6.6, y:1.95, w:2.9, h:2.8, fontSize:12, color:C.slate, align:"left", valign:"top", lineSpacingMultiple:1.45 });
      }

      // Bottom watermark
      sl.addText("PostFlow AI", { x:0.45, y:5.32, w:3, h:0.2, fontSize:8, color:C.muted, align:"left" });

      // Key takeaway box at bottom
      if (s.takeaway) {
        sl.addShape(pres.ShapeType.roundRect, { x:0.45, y:4.7, w:5.7, h:0.55, fill:{color:C.light}, rectRadius:0.1, line:{color:"BFDBFE",width:1} });
        sl.addText(`⭐ ${s.takeaway}`, { x:0.55, y:4.7, w:5.5, h:0.55, fontSize:11, color:C.brand, bold:true, align:"left", valign:"middle" });
      }
    }

    // ── CTA / FINAL SLIDE ──
    else {
      sl.background = { color: C.navy };
      // Decorative shapes
      sl.addShape(pres.ShapeType.ellipse, { x:6.5,  y:-0.5, w:5,   h:5,   fill:{color:C.brand,transparency:85}, line:{color:C.brand,width:0} });
      sl.addShape(pres.ShapeType.ellipse, { x:-0.5, y:3.5,  w:3.5, h:3.5, fill:{color:C.accent,transparency:88}, line:{color:C.accent,width:0} });
      sl.addShape(pres.ShapeType.ellipse, { x:8.5,  y:3.8,  w:2,   h:2,   fill:{color:C.teal,transparency:88}, line:{color:C.teal,width:0} });
      // Top label
      sl.addText("KEY TAKEAWAY", { x:0.55, y:0.45, w:9, h:0.38, fontSize:11, color:C.accent, bold:true, align:"left", charSpacing:2 });
      // Main heading
      sl.addText(s.heading || "", { x:0.55, y:0.95, w:8.5, h:2.0, fontSize:28, color:C.white, bold:true, align:"left",
        shadow:{ type:"outer", color:"000000", blur:6, offset:2, angle:45, opacity:0.4 } });
      // Divider
      sl.addShape(pres.ShapeType.rect, { x:0.55, y:3.05, w:2.2, h:0.07, fill:{color:C.accent}, line:{color:C.accent,width:0} });
      // Body
      sl.addText(s.body || "", { x:0.55, y:3.25, w:7, h:1.2, fontSize:13, color:C.muted, align:"left", lineSpacingMultiple:1.4 });
      // CTA Button
      sl.addShape(pres.ShapeType.roundRect, { x:0.55, y:4.65, w:3.2, h:0.65, fill:{color:C.accent}, rectRadius:0.14, line:{color:C.accent,width:0} });
      sl.addText("Follow for more insights →", { x:0.55, y:4.65, w:3.2, h:0.65, fontSize:13, color:C.navy, bold:true, align:"center", valign:"middle" });
      // Bottom
      sl.addShape(pres.ShapeType.rect, { x:0, y:5.25, w:10, h:0.375, fill:{color:C.brand,transparency:70}, line:{color:C.brand,width:0} });
      sl.addText("PostFlow AI  |  Made for LinkedIn Creators", { x:0.55, y:5.25, w:9, h:0.375, fontSize:9, color:C.muted, align:"left", valign:"middle" });
    }
  });

  return await pres.write({ outputType:"blob" });
}

  const sb=(k,v)=>setBusy(p=>({...p,[k]:v}));
  const sm=(k,v)=>setMsgs(p=>({...p,[k]:v}));

  function saveKeys() {
    if (!geminiKey.trim()||geminiKey.trim().length<10){sm("keys","⚠️ Enter a valid Gemini key (starts with AIza...)");return;}
    localStorage.setItem("pf_gkey",geminiKey.trim());

    if (!domain&&!custom.trim()){sm("topics","⚠️ Choose a domain or type a topic.");return;}
    sb("topics",true);sm("topics","");
    try {
      // Include user draft/idea as extra context if provided
      const draftCtx = userDraft.trim()
        ? `\n\nThe user has provided this draft or idea as starting context — use it to make suggestions more relevant:\n"""\n${userDraft.trim()}\n"""`
        : "";
      const ctx = custom.trim() ? `Custom topic: "${custom}"` : `Domain: "${domain}"`;
      const raw = await aiText(
        `Generate 6 trending, high-engagement LinkedIn post ideas for ${ctx}.${draftCtx}\nReturn ONLY a JSON array, no markdown:\n[{"title":"...","hook":"...","why":"...","emoji":"...","angle":"..."}]`,
        geminiKey
      );
      const parsed = parseJSON(raw);
      if(parsed&&parsed.length){setTopics(parsed);setStep(2);sm("topics","");}
      else sm("topics","⚠️ Could not read response — please try again.");
    } catch(e){sm("topics",`❌ ${e.message}`);}
    sb("topics",false);
  }

  function pick(t){
    setSelected(t);setPost("");setTags("");setPptSlides(null);setPptBlob(null);setPhotos([]);setPickedImg(null);setShowChange(false);setChangeReq("");
  }
  function useDirect(){

  }

  // Draft from user's own draft/idea OR from selected topic
  async function draftPost(isRefinement=false){
    if(!selected&&!userDraft.trim()&&!isRefinement)return;
    sb("post",true);sm("post","");
    try {
      let prompt;
      if (isRefinement && changeReq.trim()) {
        // AI refine based on user's change request
        prompt = `You previously wrote this LinkedIn post:\n"""\n${post}\n"""\n\nThe user wants these changes: "${changeReq.trim()}"\n\nRewrite the post applying those changes. Keep the same storytelling format (hook → story → lessons → CTA). Return ONLY the updated post text, no explanation.`;
      } else if (userDraft.trim() && (!selected || selected.angle==="custom")) {
        // Polish/enhance the user's own draft
        prompt = `The user has provided this LinkedIn post draft or idea:\n"""\n${userDraft.trim()}\n"""\n\nEnhance and polish it into a full viral LinkedIn post using this format:\n1. One bold punchy hook line (keep or improve theirs)\n2. 2-3 sentences of personal story/insight\n3. Exactly 3 numbered lessons or tips\n4. Soft CTA (not salesy)\n\nLength: 180-240 words. Conversational, first person. Blank line between each section.\nReturn ONLY the post text, no explanation.`;
      } else {
        // Normal topic-based draft
        const draftCtx = userDraft.trim()
          ? `\n\nAdditional context from the user:\n"""\n${userDraft.trim()}\n"""`
          : "";
        prompt = `Write a LinkedIn post about: "${selected.title}" (angle: ${selected.angle||"storytelling"}).${draftCtx}\nFormat:\n1. One bold punchy hook line\n2. 2-3 sentences personal story/insight\n3. Exactly 3 numbered lessons\n4. Soft CTA (not salesy)\nLength: 180-240 words. Conversational, first person. Blank line between sections.`;
      }

      const [p, t] = await Promise.all([
        aiText(prompt, geminiKey),
        tags ? Promise.resolve(tags) : aiText(`Give exactly 5 LinkedIn hashtags for: "${selected?.title || 'LinkedIn content'}". Return ONLY hashtags separated by spaces, nothing else.`, geminiKey),
      ]);
      setPost(p); setTags(t.trim());
      setImgQuery(selected?.title || (userDraft.trim().slice(0,40)) || "professional");
      setShowChange(false); setChangeReq("");
      setStep(3);
    } catch(e){sm("post",`❌ ${e.message}`);}
    sb("post",false);
  }

  async function draftFromOwnIdea() {
    if (!userDraft.trim()) { sm("draft","⚠️ Please write your idea or draft in the box above first."); return; }
    pick({ title: userDraft.trim().slice(0,60), hook:"Your draft", why:"Your idea", emoji:"✍️", angle:"own-draft" });
    setTopics([]); setStep(2);
    // immediately draft
    sb("post",true); sm("post","");
    try {
      const [p,t] = await Promise.all([
        aiText(`The user has provided this LinkedIn post draft or idea:\n"""\n${userDraft.trim()}\n"""\n\nEnhance and polish it into a full viral LinkedIn post:\n1. One bold punchy hook line\n2. 2-3 sentences personal story/insight\n3. Exactly 3 numbered lessons\n4. Soft CTA (not salesy)\nLength: 180-240 words. Conversational, first person. Blank line between sections.\nReturn ONLY the post text.`, geminiKey),
        aiText(`Give 5 LinkedIn hashtags for this topic: "${userDraft.trim().slice(0,80)}". Return ONLY hashtags separated by spaces.`, geminiKey),
      ]);
      setPost(p); setTags(t.trim());
      setImgQuery(userDraft.trim().slice(0,40));
      setStep(3);
    } catch(e) { sm("post",`❌ ${e.message}`); }
    sb("post",false);
  }

  async function genPPT(){
    const Lib=window.PptxGenJS;
    if(!Lib){sm("ppt","❌ PPT library not loaded. Please refresh the page.");return;}
    sb("ppt",true);sm("ppt","🤖 AI is crafting your slide content...");
    try{
      const topicTitle = selected?.title || userDraft.trim().slice(0,60) || "LinkedIn Insights";
      const raw=await aiText(
        `Create a professional 6-slide LinkedIn carousel about: "${topicTitle}"\n\nIMPORTANT: Return ONLY valid JSON, absolutely no markdown, no explanation:\n{\n"title":"compelling carousel title (max 8 words)",\n"slides":[\n  {"heading":"attention-grabbing title for the carousel","body":"one-line compelling subtitle"},\n  {"heading":"slide 2 heading (max 8 words)","body":"explanation in 40-55 words","label":"Section Name","stat":"a real statistic like 73%","statLabel":"2-3 word description of what this stat means and why it matters","takeaway":"one key insight in 10 words"},\n  {"heading":"slide 3 heading","body":"explanation in 40-55 words","label":"Section Name","tip":"one highly actionable pro tip in 30-40 words","takeaway":"key insight in 10 words"},\n  {"heading":"slide 4 heading","body":"explanation in 40-55 words","label":"Section Name","stat":"another compelling stat","statLabel":"explanation of the stat","takeaway":"key insight in 10 words"},\n  {"heading":"slide 5 heading","body":"explanation in 40-55 words","label":"Section Name","tip":"another actionable pro tip in 30-40 words","takeaway":"key insight in 10 words"},\n  {"heading":"powerful CTA heading (max 10 words)","body":"compelling closing message encouraging them to follow, 20-30 words"}\n]}`,
        geminiKey
      );
      const parsed=parseJSON(raw);
      if(!parsed?.slides||parsed.slides.length<6){sm("ppt","⚠️ Could not parse slides. Trying again...");sb("ppt",false);return;}
      setPptSlides(parsed.slides);
      sm("ppt","📊 Rendering your advanced PowerPoint...");
      const blob=await buildPPTX(parsed.slides, parsed.title||topicTitle, topicTitle);
      setPptBlob(blob);
      sm("ppt","✅ Done! Click the green Download button.");
    }catch(e){sm("ppt",`❌ ${e.message}`);}
    sb("ppt",false);
  }

  function dlPPT(){
    if(!pptBlob)return;
    const url=URL.createObjectURL(pptBlob);
    const a=document.createElement("a");
    a.href=url;a.download=`${(selected?.title||"carousel").slice(0,40).replace(/[^a-z0-9]/gi,"-")}.pptx`;
    a.click();URL.revokeObjectURL(url);
  }

  async function doImageSearch(){
    if(!imgQuery.trim())return;
    sb("img",true);sm("img","");
    try{
      const results=await searchImages(imgQuery,pexelsKey);
      if(results.length){setPhotos(results);sm("img","");}
      else sm("img","⚠️ No results. Try different keywords.");
    }catch(e){sm("img",`❌ ${e.message}`);}
    sb("img",false);
  }

  // Styles

                </div>

              <strong style={{color:"#0F172A"}}>Get your free Gemini key (60 sec):</strong><br/>

          <textarea

              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {!pptBlob
                  ?<button style={{...bO,opacity:busy.ppt?0.6:1}} onClick={genPPT} disabled={busy.ppt}>{busy.ppt?<><Spin color="#0A66C2"/>Building...</>:"⚡ Generate Advanced PPT"}</button>

              </div>
            </div>
            {msgs.ppt&&<Notice type={msgs.ppt.startsWith("✅")?"success":msgs.ppt.startsWith("❌")?"error":"warn"}>{msgs.ppt}</Notice>}
            {pptSlides&&(
              <div style={{marginTop:14}}>
                <div style={{fontSize:12,color:"#64748B",marginBottom:9}}>Preview of your {pptSlides.length} slides:</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(148px,1fr))",gap:9}}>
                  {pptSlides.map((s,i)=>{
                    const isT=i===0,isL=i===pptSlides.length-1;
                    return (
                      <div key={i} style={{border:"1px solid #E2E8F0",borderRadius:10,overflow:"hidden",background:isT||isL?"#0A1628":"#fff"}}>
                        <div style={{background:isT||isL?"#0A66C2":"linear-gradient(90deg,#0A66C2,#38BDF8)",height:4}}/>
                        <div style={{padding:"9px 11px"}}>
                          <div style={{fontSize:9,color:isT||isL?"#38BDF8":"#0A66C2",fontWeight:800,marginBottom:3,textTransform:"uppercase",letterSpacing:.4}}>{isT?"📌 Cover":isL?"🎯 CTA":`💡 Slide ${i}`}</div>
                          <div style={{fontWeight:700,fontSize:11,color:isT||isL?"#F0F4FF":"#0F172A",lineHeight:1.3,marginBottom:3}}>{s.heading}</div>
                          <div style={{fontSize:10,color:"#94A3B8",lineHeight:1.35}}>{(s.body||"").slice(0,55)}{(s.body||"").length>55?"…":""}</div>
                          {s.stat&&<div style={{marginTop:5,fontSize:14,fontWeight:900,color:"#0A66C2"}}>{s.stat}</div>}
                          {s.tip&&<div style={{marginTop:4,fontSize:9,color:"#7C3AED"}}>💡 Has Pro Tip</div>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        )}

        {/* ── IMAGES ── */}
        {step>=3&&(
          <div style={card}>
            <h2 style={{margin:"0 0 4px",fontSize:18,color:"#0F172A"}}>🖼️ Cover Photos</h2>
            <p style={{margin:"0 0 12px",fontSize:13,color:"#64748B"}}>
              {pexelsKey?"Powered by Pexels · Real photo search · Free":"Powered by Picsum Photos · Beautiful random professional photos · No API key needed · Add a free Pexels key above for real topic search"}
            </p>
            <div style={{display:"flex",gap:9,flexWrap:"wrap"}}>
              <input type="text" value={imgQuery} onChange={e=>setImgQuery(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doImageSearch()} placeholder="Search e.g. leadership, technology, teamwork..." style={{...inp,flex:1,minWidth:180}}/>
              <button style={{...bV,opacity:busy.img||!imgQuery.trim()?0.6:1}} onClick={doImageSearch} disabled={busy.img||!imgQuery.trim()}>
                {busy.img?<><Spin/>Searching...</>:"🔍 Find Photos"}
              </button>
            </div>
            {msgs.img&&<Notice type="error">{msgs.img}</Notice>}
            {photos.length>0&&(
              <div style={{marginTop:14}}>
                <div style={{fontSize:12,color:"#64748B",marginBottom:9}}>Click to select · ↓ button to download full resolution</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:9}}>
                  {photos.map((ph,i)=>(
                    <div key={i} onClick={()=>setPickedImg(ph)} style={{borderRadius:10,overflow:"hidden",cursor:"pointer",border:`3px solid ${pickedImg===ph?"#0A66C2":"transparent"}`,transition:"border .15s"}}>
                      <img src={ph.thumb} alt="stock" style={{width:"100%",height:110,objectFit:"cover",display:"block"}} onError={e=>{e.target.style.background="#E2E8F0";e.target.src="";}}/>
                      <div style={{padding:"6px 8px",background:"#F8FAFC",borderTop:"1px solid #E2E8F0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <span style={{fontSize:10,color:"#64748B",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:130}}>📷 {ph.credit}</span>
                        <a href={ph.download} download="photo.jpg" target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{background:"#0A66C2",color:"#fff",border:"none",borderRadius:6,padding:"3px 8px",fontSize:10,fontWeight:700,textDecoration:"none",flexShrink:0}}>↓</a>
                      </div>
                    </div>
                  ))}
                </div>
                {pickedImg&&(
                  <div style={{marginTop:12,padding:"10px 14px",background:"#EFF6FF",borderRadius:10,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                    <img src={pickedImg.thumb} style={{width:60,height:40,objectFit:"cover",borderRadius:6}} alt="selected"/>
                    <div style={{flex:1,fontSize:13,color:"#1D4ED8"}}>✓ Selected · Photo by <strong>{pickedImg.credit}</strong> via {pickedImg.source}</div>
                    <a href={pickedImg.download} download="linkedin-cover.jpg" target="_blank" rel="noopener noreferrer" style={{...bG,textDecoration:"none"}}>⬇ Download Full Res</a>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {step>=3&&<div style={{textAlign:"center",marginTop:4,marginBottom:20}}><button style={bO} onClick={reset}>🔄 Start a New Post</button></div>}
      </div>
    </div>
  );
}

function App() {
  const [view, setView] = useState("landing");
  return view==="landing" ? <Landing onLaunch={()=>setView("tool")}/> : <Tool onHome={()=>setView("landing")}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
